<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  <title>大观园模拟</title>
  <style>
    :root {
      /* 浅绿基底 */
      --jn-page: #e6efe3;
      --jn-surface: #dfead8;
      --jn-surface-2: #ecf2e8;
      --jn-surface-3: #d4e0cc;
      --jn-surface-4: #c9d8c4;
      --jn-surface-deep: #c5d6bc;
      --jn-surface-card: #d8e8d0;
      --jn-surface-raised: #e8f2e4;
      --jn-surface-active: #b8c9b0;
      --jn-surface-hover: #c8d8c0;
      --jn-track: #b5c8ae;
      --jn-border: #8b7768;
      --jn-border-2: #6b5a4c;
      --jn-border-3: #a89888;
      --jn-border-light: #c5b8a8;
      /* 深棕文字 */
      --jn-ink: #3d3028;
      --jn-ink-2: #5c4f42;
      --jn-ink-3: #7a6b5c;
      --jn-ink-4: #8a7d72;
      --jn-title: #3d3028;
      --jn-heading: #5c4033;
      --jn-text: #5c4f42;
      --jn-text-soft: #7a6b5c;
      --jn-text-muted: #8a7d72;
      --jn-text-dim: #9a8b7a;
      --jn-text-warm: #8a7d68;
      /* 点缀：古金 */
      --jn-gold: #a8843a;
      --jn-gold-bright: #c9a227;
      --jn-gold-soft: #d4b896;
      --jn-gold-dark: #8b6914;
      /* 水红 */
      --jn-red: #b87a7a;
      --jn-red-soft: #d9a0a0;
      --jn-red-deep: #a65d5d;
      --jn-red-bright: #c45a5a;
      --jn-red-muted: #c48878;
      --jn-red-dark: #8b4545;
      /* 水蓝 */
      --jn-blue: #6a8fa8;
      --jn-blue-soft: #9bb5c8;
      --jn-blue-deep: #527a94;
      --jn-blue-text: #7a9eb8;
      /* 绿 */
      --jn-green: #6d8f72;
      --jn-green-soft: #a8c4ac;
      --jn-green-bright: #5a9e62;
      --jn-green-light: #8fb896;
      --jn-green-deep: #4a7a52;
      --jn-green-bg: rgba(109, 143, 114, 0.15);
      --jn-red-bg: rgba(166, 93, 93, 0.12);
      /* 其他语义色 */
      --jn-warn: #c9a040;
      --jn-warn-soft: #d4a858;
      --jn-purple: #8a7a9a;
      --jn-purple-deep: #7a6a8a;
      --jn-gray: #a09890;
      --jn-brown: #7a5a40;
      --jn-white: #faf8f4;
      --jn-shadow: rgba(61, 48, 40, 0.14);
      --jn-overlay: rgba(46, 38, 32, 0.48);
      --jn-overlay-dark: rgba(46, 38, 32, 0.55);
      --jn-log-bg: rgba(200, 218, 192, 0.98);
      --jn-bar-bg: rgba(197, 214, 188, 0.95);
      --jn-entry-bg: rgba(216, 232, 208, 0.75);
      --jn-ring-bg: rgba(216, 232, 208, 0.92);
      --jn-sector-bg: rgba(200, 216, 192, 0.95);
      --jn-llm-bg: rgba(228, 240, 222, 0.96);
      --jn-gold-border: rgba(168, 132, 58, 0.45);
      --jn-gold-glow: rgba(168, 132, 58, 0.15);
      --jn-gold-ring: rgba(168, 132, 58, 0.35);
      --jn-green-ring: rgba(143, 184, 150, 0.35);
      --jn-paper-wash: rgba(250, 248, 240, 0.22);
      --jn-paper-fleck: rgba(92, 64, 51, 0.055);
      --jn-lacquer: #7b3f35;
      --jn-lacquer-soft: rgba(123, 63, 53, 0.16);
      --jn-btn-top: #eef6ea;
      --jn-btn-bottom: #c8dac0;
      --jn-btn-active: #b8caaa;
      --jn-hairline: rgba(250, 248, 244, 0.48);
      --jn-warn-bg: rgba(168, 132, 58, 0.12);
      --jn-warn-sector: rgba(200, 180, 140, 0.95);
      --jn-speaking-bg: rgba(168, 132, 58, 0.08);
      --jn-speaking-border: rgba(168, 132, 58, 0.55);
      --jn-shift-border: rgba(139, 119, 104, 0.5);
      --jn-preview-bg: rgba(197, 214, 188, 0.5);
      --jn-shift-opt-bg: rgba(216, 232, 208, 0.9);
      --jn-portrait-glow: rgba(168, 132, 58, 0.4);
      --jn-quest-ring: rgba(168, 132, 58, 0.45);
      --jn-risk-ring: rgba(201, 160, 64, 0.35);
      --jn-llm-badge-ring: rgba(143, 184, 150, 0.28);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--jn-page); }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", "Source Han Sans SC", Arial, sans-serif; color: var(--jn-ink);
      display: flex; align-items: stretch; justify-content: stretch;
      background:
        radial-gradient(circle at 18% 14%, rgba(250, 248, 240, .52) 0 1px, transparent 1px 8px),
        radial-gradient(circle at 72% 78%, rgba(92, 64, 51, .05) 0 1px, transparent 1px 10px),
        linear-gradient(135deg, #edf5e9 0%, #dce9d5 52%, #d0dfc9 100%);
    }
    #app-root {
      width: 100vw; height: 100vh; min-width: 1280px; min-height: 720px;
      display: flex; flex-direction: row;
      background:
        linear-gradient(90deg, rgba(250,248,244,.16), transparent 22%, transparent 78%, rgba(92,64,51,.05)),
        var(--jn-surface);
      border: 3px double var(--jn-border);
      box-shadow: inset 0 0 0 1px var(--jn-hairline), 0 12px 36px rgba(61, 48, 40, .16);
    }
    button {
      appearance: none;
      transition: background .16s ease, border-color .16s ease, color .16s ease, transform .08s ease, box-shadow .16s ease;
    }
    button:active:not(:disabled) { transform: translateY(1px); }
    button:focus-visible { outline: 2px solid var(--jn-gold-bright); outline-offset: 2px; }
    ::-webkit-scrollbar { width: 9px; height: 9px; }
    ::-webkit-scrollbar-track { background: rgba(181, 200, 174, .34); }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #bca36f, #8b7768);
      border: 2px solid rgba(232, 242, 228, .85);
      border-radius: 10px;
    }
    #log-sidebar {
      flex: 0 0 8%; min-width: 100px; max-width: 160px;
      display: flex; flex-direction: column;
      background:
        linear-gradient(180deg, rgba(250,248,244,.3), transparent 32%),
        var(--jn-log-bg);
      border-right: 3px double var(--jn-border-2);
    }
    #log-sidebar .log-head {
      flex: 0 0 auto; padding: 10px 6px; text-align: center;
      border-bottom: 1px solid var(--jn-gold-border); color: var(--jn-heading); font-size: 12px; letter-spacing: 3px;
      background:
        linear-gradient(90deg, transparent, rgba(168,132,58,.18), transparent),
        rgba(232, 242, 228, .6);
      text-shadow: 0 1px 0 rgba(250,248,244,.65);
    }
    #log-list {
      flex: 1; overflow-y: auto; padding: 6px; font-size: 11px;
    }
    #log-list.user-scrolled { scroll-behavior: auto; }
    .log-entry {
      margin-bottom: 7px; padding: 6px 7px; background: var(--jn-entry-bg);
      border: 1px solid rgba(107, 90, 76, .22);
      border-left: 3px solid var(--jn-border-2); border-radius: 6px;
      box-shadow: 0 1px 0 var(--jn-hairline), 0 2px 5px rgba(61,48,40,.05);
    }
    .log-entry.cat-social { border-left-color: var(--jn-blue); }
    .log-entry.cat-task { border-left-color: var(--jn-red-deep); }
    .log-entry.cat-system { border-left-color: var(--jn-text-soft); }
    .log-entry .log-time { font-size: 9px; color: var(--jn-text-dim); margin-bottom: 2px; }
    .log-entry .log-text { color: var(--jn-text); line-height: 1.35; word-break: break-all; }
    .log-entry.cat-task .log-text { color: var(--jn-red-soft); }
    .log-entry.cat-social .log-text { color: var(--jn-blue-text); }
    .log-entry.cat-system .log-text.warn { color: var(--jn-warn); }
    #log-filters {
      flex: 0 0 auto; display: flex; flex-wrap: wrap; gap: 2px; padding: 6px 4px;
      border-top: 1px solid var(--jn-border-2);
      background: linear-gradient(180deg, var(--jn-surface-card), var(--jn-surface-deep));
    }
    #log-filters button {
      flex: 1 1 45%; font-size: 9px; padding: 4px 2px;
      background: linear-gradient(180deg, var(--jn-btn-top), var(--jn-btn-bottom));
      border: 1px solid var(--jn-border); color: var(--jn-text-soft); cursor: pointer; font-family: inherit;
      border-radius: 999px; box-shadow: inset 0 1px 0 var(--jn-hairline);
    }
    #log-filters button:hover,
    #log-filters button.active {
      color: var(--jn-heading); border-color: var(--jn-gold);
      box-shadow: inset 0 1px 0 var(--jn-hairline), 0 0 0 2px var(--jn-gold-glow);
    }
    #main-column {
      flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0;
    }
    #status-bar {
      flex: 0 0 4%; min-height: 28px; display: flex; align-items: center; justify-content: center;
      gap: 12px; padding: 0 12px; font-size: 13px;
      background:
        linear-gradient(90deg, rgba(168,132,58,.18), transparent 14%, transparent 86%, rgba(168,132,58,.18)),
        linear-gradient(180deg, #edf5e9, var(--jn-bar-bg));
      border-bottom: 3px double var(--jn-border-2);
      color: var(--jn-heading); letter-spacing: 1px;
      box-shadow: inset 0 -1px 0 var(--jn-hairline);
    }
    #status-bar .sb-sep { color: var(--jn-border-2); }
    #status-bar .sb-field { white-space: nowrap; }
    #status-bar .sb-field.fade { animation: sbFade .2s ease; }
    #status-bar .llm-toggle {
      display: inline-flex; align-items: center; gap: 6px; height: 22px;
      padding: 0 9px; border-radius: 999px; border: 1px solid rgba(95, 111, 78, .36);
      background: rgba(255,255,255,.38); color: var(--jn-heading);
      font: inherit; font-size: 12px; letter-spacing: .5px; cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.5);
    }
    #status-bar .llm-toggle:hover { background: rgba(255,255,255,.62); }
    #status-bar .llm-toggle:disabled { cursor: wait; opacity: .78; }
    #status-bar .llm-toggle .llm-dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--jn-text-muted);
      box-shadow: 0 0 0 2px rgba(255,255,255,.5);
    }
    #status-bar .llm-toggle.on .llm-dot {
      background: var(--jn-green-bright);
      box-shadow: 0 0 0 2px rgba(98, 150, 84, .16), 0 0 8px rgba(98, 150, 84, .56);
    }
    #status-bar .llm-toggle.starting .llm-dot {
      background: var(--jn-gold); animation: llmPulse 1s ease-in-out infinite;
    }
    #status-bar .llm-toggle.error .llm-dot { background: var(--jn-red-bright); }
    #status-bar .llm-toggle .llm-model { color: var(--jn-text-muted); }
    @keyframes llmPulse { 0%,100% { transform: scale(.86); opacity: .55; } 50% { transform: scale(1.18); opacity: 1; } }
    @keyframes sbFade { from { opacity: .3; } to { opacity: 1; } }
    #main-view {
      flex: 0 0 64%; min-height: 200px; position: relative; overflow: hidden;
      border-bottom: 2px solid var(--jn-border-2);
      background: #d8e8d0;
    }
    #main-view::after {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      box-shadow: inset 0 0 0 1px rgba(250,248,244,.35), inset 0 0 36px rgba(61,48,40,.1);
    }
    #main-view canvas {
      display: block; width: 100%; height: 100%; cursor: crosshair;
      image-rendering: pixelated; image-rendering: crisp-edges;
    }
    #minimap-nav {
      position: absolute; z-index: 9; top: 10px; right: 10px;
      width: 190px; padding: 7px 7px 8px; box-sizing: border-box;
      border: 1px solid rgba(107,90,76,.78); border-radius: 9px;
      background: rgba(232,242,228,.92);
      box-shadow: 0 4px 14px rgba(61,48,40,.24), inset 0 1px 0 rgba(255,255,255,.65);
      backdrop-filter: blur(3px); user-select: none;
    }
    .minimap-head {
      display: flex; justify-content: space-between; align-items: center;
      height: 18px; padding: 0 2px 5px; color: var(--jn-heading);
      font-size: 10px; letter-spacing: 1px;
    }
    #minimap-mode { color: var(--jn-text-soft); letter-spacing: 0; font-size: 9px; }
    #minimap-nav.browsing #minimap-mode { color: var(--jn-gold); }
    #minimap {
      display: block; width: 174px; height: 112px; cursor: grab;
      border: 1px solid rgba(61,48,40,.65); border-radius: 4px;
      background: #b9c9ae; touch-action: none;
      image-rendering: auto;
    }
    #minimap.dragging { cursor: grabbing; }
    #action-queue-panel {
      flex: 0 0 6%; min-height: 36px; display: flex; align-items: stretch;
      background:
        linear-gradient(180deg, rgba(250,248,244,.28), transparent),
        var(--jn-surface-card);
      border-bottom: 1px solid var(--jn-border-2); overflow: hidden;
    }
    #bottom-info-panel {
      flex: 0 0 22%; min-height: 120px; display: grid;
      grid-template-columns: minmax(250px, 25%) minmax(112px, 12%) minmax(360px, 1fr) minmax(250px, 25%);
      background:
        radial-gradient(circle at 20% 0%, rgba(250,248,244,.26), transparent 36%),
        var(--jn-surface-card);
      border-bottom: 1px solid var(--jn-border-2); overflow: hidden;
    }
    .info-col {
      padding: 6px 8px; border-right: 1px solid var(--jn-border-2); overflow: hidden;
      display: flex; flex-direction: column; min-width: 0;
      background:
        linear-gradient(90deg, rgba(250,248,244,.14), transparent 28%),
        linear-gradient(180deg, rgba(139,119,104,.04), transparent 22%);
    }
    .info-col:last-child { border-right: none; }
    #col-char { overflow: hidden; }
    #col-family { min-width: 0; }
    #col-skill { min-width: 0; }
    #col-quest { min-width: 0; }
    .col-head {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 6px; font-size: 11px; color: var(--jn-heading);
      letter-spacing: 1px; border-bottom: 1px solid var(--jn-gold-border); padding-bottom: 3px;
    }
    .col-head .col-expand {
      font-size: 9px; padding: 2px 8px;
      background: linear-gradient(180deg, var(--jn-btn-top), var(--jn-btn-bottom));
      border: 1px solid var(--jn-border); border-radius: 999px;
      color: var(--jn-text-soft); cursor: pointer; font-family: inherit;
    }
    .col-head .col-expand:hover { color: var(--jn-heading); border-color: var(--jn-gold); }
    .current-char-layout {
      display: grid; grid-template-columns: 104px minmax(0, 1fr); gap: 9px;
      height: 100%; min-height: 0;
    }
    .current-char-art {
      min-height: 0; overflow: hidden; position: relative;
      border-right: 1px solid var(--jn-gold-border);
      background: linear-gradient(180deg, rgba(250,248,244,.4), rgba(184,202,174,.36));
      cursor: pointer;
    }
    .current-char-art:hover { box-shadow: inset 0 0 0 2px var(--jn-gold); }
    .current-char-art::after {
      content: "点击回到人物"; position: absolute; left: 5px; right: 5px; bottom: 5px;
      padding: 3px 2px; border-radius: 4px; text-align: center; font-size: 9px;
      color: #fff8df; background: rgba(61,48,40,.68); opacity: 0;
      transition: opacity .16s; pointer-events: none;
    }
    .current-char-art:hover::after { opacity: 1; }
    .current-char-art img {
      width: 100%; height: 100%; display: block; object-fit: contain;
      object-position: center top; filter: drop-shadow(0 3px 5px rgba(61,48,40,.18));
    }
    .current-char-art-fallback { width: 100%; height: 100%; opacity: .35; }
    .current-char-details {
      min-width: 0; min-height: 0; overflow-y: auto; padding: 1px 3px 2px 0;
    }
    .char-portrait {
      width: 42px; height: 42px; border-radius: 50%; margin: 0 auto 5px;
      border: 2px solid var(--jn-border-2); overflow: hidden;
      box-shadow: 0 0 0 2px rgba(232,242,228,.85), 0 3px 8px rgba(61,48,40,.16);
    }
    .char-portrait img { width: 100%; height: 100%; object-fit: cover; object-position: center 12%; display: block; }
    .char-portrait.active { border-color: var(--jn-gold); box-shadow: 0 0 0 2px rgba(232,242,228,.85), 0 0 10px var(--jn-portrait-glow); }
    .char-col-name { font-size: 13px; font-weight: 700; color: var(--jn-title); margin-bottom: 3px; }
    .char-col-status { font-size: 9px; color: var(--jn-text-soft); margin-bottom: 4px; min-height: 12px; }
    .need-priority .bar-row { margin-bottom: 3px; display: flex; align-items: center; gap: 3px; }
    .need-priority .bar-label { width: 22px; font-size: 10px; flex-shrink: 0; }
    .need-priority .bar-track { height: 6px; flex: 1; min-width: 0; }
    .need-priority .bar-val { width: 26px; font-size: 9px; color: var(--jn-text-soft); text-align: right; flex-shrink: 0; }
    .need-priority .bar-fill.critical { animation: barBlink 1s infinite; }
    @keyframes barBlink { 50% { opacity: .55; } }
    .state-tags { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px; align-content: flex-start; }
    .tag.state.buff { border-color: var(--jn-green-bright); color: var(--jn-green-light); background: var(--jn-green-bg); }
    .tag.state.debuff { border-color: var(--jn-red-deep); color: var(--jn-red-bright); background: var(--jn-red-bg); }
    .tag.state.neutral { border-color: var(--jn-text-dim); color: var(--jn-text-muted); }
    .fam-row-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .fam-row-header .fam-title { font-size: 11px; color: var(--jn-heading); }
    #btn-family-switch-sm {
      font-size: 9px; padding: 2px 8px;
      background: linear-gradient(180deg, var(--jn-btn-top), var(--jn-btn-bottom));
      border: 1px solid var(--jn-border); border-radius: 999px;
      color: var(--jn-title); cursor: pointer; font-family: inherit;
    }
    #btn-family-switch-sm:hover { border-color: var(--jn-gold); color: var(--jn-heading); }
    .member-avatars {
      display: flex; flex-wrap: nowrap; gap: 8px; align-items: flex-start;
      min-width: 0; overflow-x: auto; overflow-y: hidden; padding: 2px 2px 5px;
    }
    .member-av {
      width: 48px; text-align: center; cursor: pointer; position: relative;
    }
    .member-av .av48 {
      width: 48px; height: 48px; border-radius: 10px; border: 2px solid var(--jn-border-2);
      display: block; margin: 0 auto 2px; overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(250,248,244,.35), 0 2px 5px rgba(61,48,40,.12);
    }
    .member-av .av48 img { width: 100%; height: 100%; object-fit: cover; object-position: center 12%; display: block; }
    .member-av:hover .av48,
    .member-av.active .av48 { border-color: var(--jn-gold); box-shadow: 0 0 0 2px var(--jn-gold-glow), 0 2px 6px rgba(61,48,40,.15); }
    .member-av .av-name { font-size: 9px; color: var(--jn-text-muted); }
    .member-av .av-role { font-size: 8px; color: var(--jn-text-dim); }
    .member-av .av-dot {
      position: absolute; top: 2px; right: 2px; width: 6px; height: 6px;
      background: var(--jn-red-deep); border-radius: 50%; display: none;
    }
    .member-av.has-debuff .av-dot { display: block; }
    .fam-meta-line { font-size: 9px; color: var(--jn-text-soft); margin-top: 6px; }
    .skill-cards {
      display: flex; flex-direction: column; flex-wrap: nowrap; gap: 5px;
      flex: 1; min-height: 0; overflow-y: auto;
    }
    .quest-cards { display: flex; flex-wrap: wrap; gap: 4px; flex: 1; overflow-y: auto; align-content: flex-start; }
    .skill-card {
      flex: 0 0 auto; width: 100%; min-width: 0;
      background: linear-gradient(180deg, rgba(250,248,244,.24), transparent), var(--jn-surface-deep);
      border: 1px solid rgba(107,90,76,.55); border-radius: 7px; padding: 5px 7px; font-size: 10px;
      box-shadow: inset 0 1px 0 var(--jn-hairline);
    }
    .skill-card .sk-name { color: var(--jn-title); }
    .skill-card .sk-lv { color: var(--jn-text-soft); font-size: 9px; }
    .skill-card .sk-xp { height: 5px; background: var(--jn-track); border: 1px solid rgba(107,90,76,.55); border-radius: 999px; margin-top: 4px; overflow: hidden; }
    .skill-card .sk-xp-fill { height: 100%; background: linear-gradient(90deg, var(--jn-green-deep), var(--jn-green-bright), var(--jn-gold-soft)); }
    .skill-row {
      display: grid; grid-template-columns: minmax(42px, 1fr) 36px minmax(64px, 1.8fr);
      align-items: center; gap: 6px; padding: 3px 0; font-size: 10px;
      border-bottom: 1px solid rgba(107,90,76,.18);
    }
    .skill-row .sk-name { color: var(--jn-title); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .skill-row .sk-lv { color: var(--jn-text-soft); font-size: 9px; text-align: right; }
    .skill-row .sk-xp { height: 6px; background: var(--jn-track); border: 1px solid rgba(107,90,76,.55); border-radius: 999px; overflow: hidden; }
    .skill-row .sk-xp-fill { height: 100%; background: linear-gradient(90deg, var(--jn-green-deep), var(--jn-green-bright), var(--jn-gold-soft)); }
    .skill-row.blocked { opacity: .45; }
    .quest-card-mini {
      flex: 1 1 100%; background: linear-gradient(180deg, rgba(250,248,244,.25), transparent), var(--jn-surface-deep);
      border: 1px solid rgba(107,90,76,.55);
      border-radius: 7px; padding: 5px 7px; font-size: 10px; cursor: pointer;
      box-shadow: inset 0 1px 0 var(--jn-hairline);
    }
    .quest-card-mini:hover { border-color: var(--jn-gold); background-color: var(--jn-surface-hover); }
    .quest-card-mini.urgent { border-color: var(--jn-red-deep); }
    .quest-card-mini.pending { border-color: var(--jn-gold); }

    .im-sector {

    /* LLM 互动调试浮层 */
    #llm-dialogue-overlay {
      display: none; position: fixed; z-index: 70;
      left: 50%; bottom: 72px; transform: translateX(-50%);
      width: min(520px, calc(100vw - 24px));
      background:
        radial-gradient(circle at 12% 0%, rgba(250,248,244,.34), transparent 34%),
        var(--jn-llm-bg);
      border: 3px double var(--jn-gold);
      border-radius: 12px; padding: 10px 12px; box-shadow: 0 12px 34px rgba(46,38,32,.42), inset 0 1px 0 var(--jn-hairline);
      font-size: 12px; pointer-events: auto;

    #llm-dialogue-overlay[data-state="paused"] .ldo-status { color: var(--jn-text-muted); }
    #llm-dialogue-overlay[data-state="error"] .ldo-status { color: var(--jn-red-bright); }
    .ldo-status { font-size: 13px; margin-bottom: 6px; color: var(--jn-heading); }
    .ldo-preview {
      color: var(--jn-title); line-height: 1.45; min-height: 1.4em;
      padding: 7px 9px; background: rgba(250,248,244,.28); border: 1px solid rgba(107,90,76,.28); border-radius: 8px;
      margin-bottom: 6px; word-break: break-word;

    .ldo-actions button {
      padding: 5px 14px; border-radius: 999px; cursor: pointer;
      font-family: inherit; font-size: 11px; border: 1px solid var(--jn-border);
      background: linear-gradient(180deg, var(--jn-btn-top), var(--jn-btn-bottom)); color: var(--jn-title);
      box-shadow: inset 0 1px 0 var(--jn-hairline);

    .ldo-actions button:hover:not(:disabled) { border-color: var(--jn-gold); color: var(--jn-heading); }
    .ldo-actions button:disabled { opacity: .45; cursor: not-allowed; }
    #ldo-stop { border-color: var(--jn-brown); color: var(--jn-red-muted); }
    #ldo-shift { border-color: var(--jn-green-deep); color: var(--jn-green-soft); }
    #ldo-shift.active { border-color: var(--jn-green-light); color: var(--jn-green-light); }
    .ldo-shift-wrap {
      margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--jn-shift-border);
    }
    .ldo-shift-hint {

    }
    .ldo-shift-opt {
      padding: 4px 9px; border-radius: 999px; cursor: pointer;
      font-family: inherit; font-size: 10px; border: 1px solid var(--jn-border);
      background: var(--jn-shift-opt-bg); color: var(--jn-gold-soft);
      display: inline-flex; align-items: center; gap: 4px;

      position: absolute;
      inset: 3px 5px auto 5px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255,255,255,.46);
    }
    .need-liquid-dot.low { border-color: var(--jn-gold); }
    .need-liquid-dot.critical {
      border-color: var(--jn-red-deep);
      animation: barBlink 1s infinite;
    }
    .need-dot-value {
      color: var(--jn-text-soft);
      min-width: 22px;
      text-align: right;
    }
    .hud-need-dots .need-liquid-dot {
      width: 11px;
      height: 11px;
      flex-basis: 11px;
    }
    .hud-state-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 14px;
      align-items: start;
      column-gap: 3px;
      margin-top: 2px;
      min-height: 18px;
      max-height: 36px;
      overflow: hidden;
      cursor: pointer;
      transition: max-height .16s ease;
    }
    .hud-state-row.expanded {
      max-height: 120px;
      overflow: visible;
      padding: 4px;
      border: 1px solid rgba(107,90,76,.24);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(250,248,244,.97), rgba(232,242,228,.96));
      box-shadow: 0 6px 16px rgba(61,48,40,.12);
      z-index: 3;
    }
    .hud-state-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      align-content: flex-start;
      min-height: 18px;
      max-height: 36px;
      overflow: hidden;
      margin-top: 0;
    }
    .hud-state-row.expanded .hud-state-tags {
      max-height: none;
      overflow: visible;
    }
    .hud-state-more {
      display: none;
      width: 14px;
      height: 16px;
      border: 0;
      background: transparent;
      color: var(--jn-text-soft);
      padding: 0;
      line-height: 14px;
      font-size: 11px;
      cursor: pointer;
      font-family: inherit;
    }
    .hud-state-row.overflowing .hud-state-more,
    .hud-state-row.expanded .hud-state-more {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .hud-skill-row {
      display: flex;
      align-items: center;
      flex-wrap: nowrap;
      gap: 4px;
      margin-top: 4px;
      min-height: 18px;
      overflow: hidden;
    }
    .hud-skill-chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      min-width: 0;
      max-width: 92px;
      height: 18px;
      padding: 0 6px;
      border: 1px solid rgba(107,90,76,.18);
      border-radius: 999px;
      background: rgba(250,248,244,.54);
      color: var(--jn-text-soft);
      font-size: 9px;
      line-height: 1;
      white-space: nowrap;
    }
    .hud-skill-chip b {
      max-width: 3.5em;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--jn-heading);
      font-weight: normal;
    }
    .hud-skill-chip span {
      color: var(--jn-text-muted);
      font-size: 8px;
    }
    .hud-skill-chip em {
      color: #a06f18;
      font-style: normal;
      font-weight: 600;
    }
    .hud-skill-chip.gain {
      border-color: rgba(202,160,79,.55);
      background: rgba(255,248,218,.78);
      box-shadow: 0 0 0 1px rgba(202,160,79,.12);
    }
    @container (max-width: 255px) {
      .hud-need-dots .need-dot-label-long { display: none; }
      .hud-need-dots .need-dot-label-short { display: inline; }
    }
    @media (max-width: 760px) {
      .hud-need-dots .need-dot-label-long { display: none; }
      .hud-need-dots .need-dot-label-short { display: inline; }
    }
    .profile-need-dots .need-dot-item {
      min-width: 78px;
      font-size: 11px;
    }
    #col-family {
      grid-column: 1 / 3;
      grid-row: 2;
      padding: 0;
      border-right: none;
      background: transparent;
      overflow: visible;
    }
    #col-family .fam-row-header {
      display: none;
    }
    #col-family .fam-title {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    #col-family #btn-family-switch-sm {
      display: none;
    }
    #col-family .member-avatars {
      padding: 0;
      gap: 5px;
      overflow: hidden;
      pointer-events: auto;
    }
    #col-family .member-av {
      width: 38px;
    }
    #col-family .member-av .av48 {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background-color: rgba(216,232,208,.82);
    }
    #col-family .member-av .av-name,
    #col-family .member-av .av-role,
    #col-family .fam-meta-line { display: none; }
    .duty-mark {
      position: absolute;
      top: -6px;
      right: 5px;
      z-index: 2;
      width: 18px;
      height: 18px;
      padding: 0;
      border-radius: 50%;
      border: 1px solid var(--jn-gold);
      background: rgba(250,248,244,.88);
      color: var(--jn-gold-dark);
      font-size: 12px;
      line-height: 16px;
      font-family: inherit;
      cursor: pointer;
      text-shadow: 0 1px 0 rgba(250,248,244,.8);
    }
    .duty-mark:hover {
      border-color: var(--jn-red-deep);
      color: var(--jn-red-deep);
      box-shadow: 0 0 0 2px var(--jn-gold-glow);
    }
    #main-stage.quest-collapsed {
      grid-template-columns: none;
    }
    #quest-rail.collapsed {
      height: 34px;
      background: rgba(216,232,208,.96);
    }
    #quest-rail.collapsed #col-quest {
      padding: 0;
    }
    .quest-rail-tab {
      width: 100%;
      height: 100%;
      border: none;
      background:
        linear-gradient(180deg, rgba(250,248,244,.32), transparent),
        var(--jn-surface-card);
      color: var(--jn-heading);
      font-family: inherit;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      letter-spacing: 1px;
      flex-direction: row;
    }
    .quest-rail-tab span {
      writing-mode: horizontal-tb;
      font-size: 12px;
    }
    .quest-rail-tab b {
      font-size: 13px;
      color: var(--jn-gold-dark);
    }
    .quest-rail-tab em {
      min-width: 18px;
      height: 18px;
      padding: 0 4px;
      border-radius: 999px;
      background: var(--jn-red-deep);
      color: var(--jn-white);
      font-style: normal;
      font-size: 10px;
      line-height: 18px;
    }
    #log-sidebar {
      position: fixed;
      left: 0;
      top: 42px;
      bottom: 0;
      width: 260px;
      max-width: 82vw;
      min-width: 0;
      z-index: 45;
      transform: translateX(-102%);
      transition: transform .18s ease, box-shadow .18s ease;
      border-right: 3px double var(--jn-border-2);
      box-shadow: none;
    }
    #log-sidebar.open {
      transform: translateX(0);
      box-shadow: 8px 0 24px rgba(46,38,32,.24);
    }
    #log-sidebar .log-head {
      letter-spacing: 1px;
    }
    #log-filters button {
      flex-basis: 22%;
    }

    @media (max-width: 1100px) {
      #app-root { min-width: 960px; }
      #bottom-info-panel { width: 432px; grid-template-columns: 368px 58px; }
      .current-char-layout { grid-template-columns: 68px minmax(0, 1fr); }
      #top-actions .top-btn { min-width: 54px; padding-left: 8px; }
    }

    .rel-grid {
      grid-template-columns: repeat(auto-fill, minmax(238px, 238px)) !important;
      align-items: stretch !important;
      justify-content: start;
    }
    .rel-card {
      height: 292px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .rel-card .rel-head {
      flex: 0 0 42px;
      min-height: 0;
      overflow: hidden;
    }
    .rel-card .rel-arc-wrap {
      flex: 1 1 auto;
      min-height: 0;
      justify-content: center;
    }
    .routine-block.locked {
      cursor: default;
      border-style: dashed;
      box-shadow: inset 0 0 0 1px rgba(88, 106, 91, 0.28), 0 8px 18px rgba(43, 53, 39, 0.1);
      filter: saturate(0.88);
    }
    .routine-block.locked .resize-handle {
      display: none;
    }
    #col-family .member-avatars {
      padding-top: 8px;
      overflow-x: auto;
      overflow-y: hidden;
    }
    #col-family .member-av {
      width: 42px;
      padding-top: 2px;
      overflow: visible;
    }
    #col-family .member-av .av-name {
      display: block;
      margin-top: 2px;
      color: var(--jn-title);
      font-size: 9px;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #col-family .member-av .av-role {
      display: none;
    }
    #col-family .duty-mark {
      top: 0;
      right: -2px;
      z-index: 8;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      font-size: 10px;
      line-height: 16px;
      padding: 0;
      transform: translateY(-35%);
      box-shadow: 0 0 0 2px rgba(250,248,244,.9), 0 2px 6px rgba(61,48,40,.22);
    }
    .command-panel {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) minmax(260px, 1fr);
      gap: 12px;
      min-height: 360px;
    }
    .command-pane {
      border: 1px solid var(--jn-border-2);
      border-radius: 10px;
      background: rgba(250,248,244,.12);
      padding: 10px;
      min-width: 0;
    }
    .command-pane h4 {
      color: var(--jn-heading);
      font-weight: normal;
      font-size: 13px;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }
    .command-targets,
    .command-groups {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 260px;
      overflow: auto;
      margin-bottom: 10px;
    }
    .command-target,
    .command-group-row {
      display: grid;
      grid-template-columns: auto 40px minmax(0, 1fr) auto;
      gap: 7px;
      align-items: center;
      border: 1px solid var(--jn-border-3);
      border-radius: 8px;
      background: rgba(255,252,245,.14);
      padding: 7px;
      cursor: pointer;
    }
    .command-target.active,
    .command-group-row:has(input:checked) {
      border-color: var(--jn-gold);
      background: rgba(246,235,197,.34);
    }
    .command-target .av48 {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--jn-border-2);
    }
    .command-target .av48 img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 12%;
      display: block;
    }
    .command-target b {
      color: var(--jn-title);
      font-size: 12px;
      font-weight: normal;
    }
    .command-target small {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      color: var(--jn-text-soft);
      font-size: 9px;
    }
    .command-target small span {
      border: 1px solid rgba(107,90,76,.3);
      border-radius: 999px;
      padding: 1px 5px;
      background: rgba(250,248,244,.22);
    }
    .command-target em {
      color: var(--jn-text-dim);
      font-size: 9px;
      font-style: normal;
      white-space: nowrap;
    }
    .command-form label {
      display: block;
      color: var(--jn-text-muted);
      font-size: 10px;
      margin-bottom: 4px;
    }
    .command-form select {
      width: 100%;
      background: rgba(250,248,244,.22);
      border: 1px solid rgba(107,90,76,.55);
      border-radius: 8px;
      color: var(--jn-title);
      font-family: inherit;
      font-size: 11px;
      padding: 6px 8px;
      margin-bottom: 8px;
    }
    .command-account-pane {
      border: 1px solid var(--jn-gold-border);
      border-radius: 10px;
      background: rgba(246,235,197,.18);
      padding: 9px 10px;
      margin-bottom: 10px;
    }
    .command-account-pane h4 {
      color: var(--jn-heading);
      font-weight: normal;
      font-size: 12px;
      margin: 0 0 5px;
    }
    .command-account-pane p,
    .command-money-box small {
      color: var(--jn-text-soft);
      font-size: 10px;
      line-height: 1.45;
      margin: 0;
    }
    .command-allowance-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 6px;
      margin: 8px 0;
    }
    .command-allowance-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 3px 8px;
      border: 1px solid rgba(107,90,76,.28);
      border-radius: 8px;
      padding: 6px 7px;
      background: rgba(255,252,245,.18);
      font-size: 10px;
    }
    .command-allowance-row span { color: var(--jn-title); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .command-allowance-row b { color: var(--jn-red-deep); font-weight: normal; white-space: nowrap; }
    .command-allowance-row small { grid-column: 1 / -1; color: var(--jn-text-soft); font-size: 9px; }
    .command-money-box {
      border: 1px solid rgba(107,90,76,.35);
      border-radius: 8px;
      padding: 7px;
      margin-bottom: 8px;
      background: rgba(255,252,245,.14);
    }
    .command-money-box.warn {
      border-color: rgba(157,60,44,.7);
      background: rgba(157,60,44,.12);
    }
    .command-failure-box {
      border: 1px solid rgba(107,90,76,.35);
      border-radius: 8px;
      padding: 7px;
      margin-bottom: 8px;
      background: rgba(250,248,244,.16);
    }
    .command-failure-box.warn {
      border-color: rgba(168,128,46,.72);
      background: rgba(246,235,197,.18);
    }
    .command-failure-box .command-money-line span {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 4px;
    }
    .command-failure-box .command-money-line span span {
      border: 1px solid rgba(107,90,76,.24);
      border-radius: 999px;
      padding: 1px 6px;
      background: rgba(255,252,245,.2);
      white-space: nowrap;
    }
    .command-failure-controls {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(92px, .72fr);
      gap: 6px;
      margin-bottom: 5px;
    }
    .command-failure-controls label {
      color: var(--jn-text-muted);
      font-size: 10px;
      margin: 0;
    }
    .command-money-line {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--jn-text-soft);
      font-size: 10px;
      margin-bottom: 6px;
    }
    .command-money-line b { color: var(--jn-heading); font-weight: normal; }
    .command-money-box select,
    .command-failure-box select {
      width: 100%;
      background: rgba(250,248,244,.22);
      border: 1px solid rgba(107,90,76,.55);
      border-radius: 7px;
      color: var(--jn-title);
      font-family: inherit;
      font-size: 11px;
      padding: 5px 7px;
      margin-bottom: 5px;
    }
    .command-failure-box small {
      color: var(--jn-text-soft);
      font-size: 10px;
      line-height: 1.45;
      margin: 0;
    }
    .command-empty {
      border: 1px dashed rgba(107,90,76,.4);
      border-radius: 8px;
      color: var(--jn-text-soft);
      font-size: 11px;
      padding: 10px;
      background: rgba(250,248,244,.08);
    }
    @media (max-width: 760px) {
      .command-panel { grid-template-columns: 1fr; }
    }
    .command-target small {
      grid-column: 3 / 5;
      grid-row: 2;
    }
    .command-target em {
      grid-column: 4;
      grid-row: 1;
    }
</style>
</head>
<body>
  <div id="app-root">
    <aside id="log-sidebar" aria-label="日志抽屉">
      <div class="log-head">消息<br>日志</div>
      <div id="log-list"></div>
      <div id="log-filters">
        <button type="button" data-filter="activity" class="active">动态</button>
        <button type="button" data-filter="social">社交</button>
        <button type="button" data-filter="task">任务</button>
        <button type="button" data-filter="system">系统</button>
      </div>
    </aside>
    <div id="main-column">
      <div id="status-bar">
        <div id="status-bar-fields"></div>
        <div id="top-actions">
          <button type="button" class="top-btn" id="btn-msg">日志<span class="menu-key">M</span></button>
          <button type="button" class="top-btn" id="btn-order">秩序<span class="menu-key">Y</span></button>
          <button type="button" class="top-btn" id="btn-admin">设置<span class="menu-key">S</span></button>
          <button type="button" class="top-btn" id="btn-help">帮助<span class="menu-key">H</span></button>
          <button type="button" class="top-btn" id="btn-family-switch-top">切换家庭<span class="menu-key">F</span></button>
          <button type="button" class="top-btn" id="btn-save-panel">存档<span class="menu-key">V</span></button>
        </div>
      </div>
      <div id="main-stage">
        <aside id="quest-rail">
          <div id="col-quest" class="info-col"></div>
        </aside>
        <aside id="action-queue-panel">
          <div id="action-queue"><span class="aq-empty">暂无排队行动</span></div>
          <div class="aq-panel-title">行动</div>
        </aside>
        <div id="main-view">
          <canvas id="game"></canvas>
        </div>
        <aside id="minimap-nav" aria-label="地图导航器" title="点击或拖动视口框浏览地图">
          <div class="minimap-head"><span>园景导航</span><span id="minimap-mode">跟随人物</span></div>
          <canvas id="minimap" width="348" height="224"></canvas>
        </aside>
      </div>
      <div id="bottom-info-panel">
        <div id="col-char" class="info-col"></div>
        <nav id="bottom-shortcuts">
          <button type="button" class="menu-btn" id="btn-profile">人物<span class="menu-key">P</span></button>
          <button type="button" class="menu-btn" id="btn-routine">起居<span class="menu-key">Q</span></button>
          <button type="button" class="menu-btn" id="btn-rel">关系<span class="menu-key">R</span></button>
          <button type="button" class="menu-btn" id="btn-group-issue" style="display:none" title="传令：点名或群体下发任务">传令<span class="menu-key">X</span></button>
          <button type="button" class="menu-btn" id="btn-more">更多<span class="menu-key">O</span></button>
          <div id="more-shortcuts" hidden>
            <button type="button" class="menu-btn" id="btn-skill-panel">技能<span class="menu-key">K</span></button>
            <button type="button" class="menu-btn" id="btn-bag">背包<span class="menu-key">B</span></button>
          </div>
        </nav>
        <div id="col-family" class="info-col"></div>
      </div>
    </div>
  </div>

  <div id="panel-overlay">
    <div class="panel-box" id="panel-content"></div>
  </div>

  <div id="llm-dialogue-overlay" data-state="waiting">
    <div class="ldo-status">等待</div>
    <div class="ldo-preview"></div>
    <div class="ldo-meta"></div>
    <div class="ldo-actions">
      <button type="button" id="ldo-shift" title="在同一场谈话中自然转向其他互动">换话题</button>
      <button type="button" id="ldo-continue">开始播放</button>
      <button type="button" id="ldo-stop">对话终止</button>
    </div>
    <div class="ldo-shift-wrap" id="ldo-shift-wrap" hidden>
      <div class="ldo-shift-hint">择一新互动，话脉相承、自然转圜</div>
      <div class="ldo-shift-list" id="ldo-shift-list"></div>
    </div>
    <div class="ldo-participants" id="ldo-participants"></div>
  </div>

  <div id="interaction-menu">
    <div class="im-ring-wrap" id="im-ring-wrap">
      <div class="im-ring-bg"></div>
      <div class="im-center">
        <button type="button" class="im-close-btn" id="im-close" title="关闭">×</button>
        <button type="button" class="im-back-btn" id="im-back" title="返回">← 返回</button>
        <span class="im-avatar-frame">
          <img id="im-avatar-img" alt="" hidden>
          <span class="im-avatar-fallback" id="im-avatar-fallback">人</span>
        </span>
        <span class="im-target" id="im-target">—</span>
        <span class="im-hint" id="im-hint">选一类互动</span>
      </div>
      <div class="im-sectors" id="im-sectors"></div>
    </div>
  </div>

  <div id="admin-overlay">
    <div id="admin-panel">
      <div id="admin-head">
        <h2>配置后台</h2>
        <div style="display:flex;gap:8px">
          <button class="btn-top" id="btn-admin-fullscreen">全屏</button>
          <button class="btn-top" id="btn-admin-close">关闭</button>
        </div>
      </div>
      <div id="admin-tabs"></div>
      <div id="admin-body"></div>
    </div>
  </div>

  <!-- 错误捕获覆盖层（调试用，正式版可删除） -->
  <div id="err-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:var(--jn-overlay-dark);z-index:99999;overflow:auto;padding:24px;font-family:monospace;font-size:13px;color:var(--jn-red-bright);white-space:pre-wrap;"></div>
  <script>
    window.addEventListener('error', function(e) {
      const el = document.getElementById('err-overlay');
      if (!el) return;
      el.style.display = 'block';
      el.textContent += '[ERROR] ' + e.message + '\n  at ' + e.filename + ':' + e.lineno + ':' + e.colno + '\n\n';
    });
    window.addEventListener('unhandledrejection', function(e) {
      const el = document.getElementById('err-overlay');
      if (!el) return;
      el.style.display = 'block';
      el.textContent += '[PROMISE] ' + String(e.reason) + '\n\n';
