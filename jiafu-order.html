<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贾府秩序</title>
  <style>
    :root {
      --paper: #f4efe3;
      --paper-2: #ebe3d1;
      --paper-3: #ded2ba;
      --ink: #2f2924;
      --muted: #77695c;
      --line: #a89274;
      --line-soft: rgba(168, 146, 116, .38);
      --green: #4f735f;
      --green-2: #dae7dc;
      --red: #9b5751;
      --gold: #a47d35;
      --blue: #506f82;
      --shadow: rgba(47, 41, 36, .16);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; min-height: 100%; }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(255,255,255,.28), transparent 18%, transparent 82%, rgba(86,65,44,.06)),
        linear-gradient(135deg, #f6f0e4 0%, #e8dcc6 52%, #d9cab1 100%);
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    body.embedded-order {
      overflow: hidden;
      background: transparent;
    }
    body.embedded-order .shell {
      height: 100vh;
      min-height: 0;
      grid-template-rows: 1fr;
    }
    body.embedded-order header { display: none; }
    body.embedded-order main {
      min-height: 0;
      height: 100vh;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 320px);
    }
    body.embedded-order .board {
      min-height: 0;
      overflow: auto;
      padding: 12px;
    }
    body.embedded-order aside {
      min-height: 0;
      overflow: auto;
    }
    body.embedded-order .tree-shell {
      height: clamp(420px, calc(100vh - 138px), 680px);
    }
    body.mini-order {
      overflow: hidden;
      background: transparent;
    }
    body.mini-order .shell {
      height: 100vh;
      min-height: 0;
      grid-template-rows: 1fr;
    }
    body.mini-order header,
    body.mini-order .panel-head,
    body.mini-order aside,
    body.mini-order .tree-filters,
    body.mini-order .tree-tools,
    body.mini-order .tree-hint,
    body.mini-order .level-rail {
      display: none !important;
    }
    body.mini-order main {
      height: 100vh;
      min-height: 0;
      display: block;
    }
    body.mini-order .board {
      height: 100vh;
      min-height: 0;
      padding: 0;
      overflow: hidden;
      background: transparent;
    }
    body.mini-order .rank-toolbar {
      position: absolute;
      z-index: 6;
      left: 8px;
      top: 8px;
      margin: 0;
      display: block;
    }
    body.mini-order .mode-switch {
      pointer-events: none;
      opacity: .86;
      transform: scale(.82);
      transform-origin: left top;
    }
    body.mini-order .mode-switch button:not(.active) { display: none; }
    body.mini-order .tree-shell {
      height: 100vh;
      border: 0;
      border-radius: 0;
      cursor: default;
    }
    body.mini-order .tree-card {
      width: 118px;
      min-height: 70px;
      grid-template-columns: 32px minmax(0, 1fr);
      gap: 6px;
      padding: 7px;
      transform: scale(.9);
      transform-origin: center;
    }
    body.mini-order .tree-card .avatar { width: 32px; height: 32px; }
    body.mini-order .tree-name { font-size: 13px; }
    body.mini-order .tree-role { font-size: 9px; }

    header {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto minmax(220px, 1fr);
      align-items: center;
      gap: 18px;
      padding: 18px 28px 12px;
      border-bottom: 3px double var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,.36), rgba(255,255,255,0)),
        rgba(244, 239, 227, .82);
    }

    .scene-switch {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-self: start;
      color: var(--muted);
      font-size: 13px;
    }

    .scene-pill {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #f8f4e9, #e4d8c2);
      color: var(--ink);
      border-radius: 999px;
      padding: 7px 13px;
      font: inherit;
      cursor: pointer;
    }

    h1 {
      text-align: center;
      font-size: 31px;
      font-weight: 650;
      letter-spacing: 0;
      color: #3d3128;
      white-space: nowrap;
    }

    .header-actions {
      justify-self: end;
      display: flex;
      gap: 8px;
    }

    .icon-btn, .text-btn {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #f8f4e9, #dfd1b9);
      color: var(--ink);
      min-height: 36px;
      border-radius: 7px;
      padding: 0 12px;
      font: inherit;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.55);
    }

    .icon-btn {
      width: 38px;
      padding: 0;
      font-size: 18px;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      border-bottom: 1px solid var(--line);
      background: rgba(222, 210, 186, .72);
    }

    .tab {
      border: 0;
      border-right: 1px solid var(--line-soft);
      background: transparent;
      min-height: 48px;
      font: inherit;
      color: var(--muted);
      cursor: pointer;
      position: relative;
    }

    .tab:last-child { border-right: 0; }
    .tab b { display: block; font-size: 15px; font-weight: 650; }
    .tab span { display: block; margin-top: 2px; font-size: 11px; }
    .tab.active {
      color: var(--ink);
      background: linear-gradient(180deg, rgba(255,255,255,.36), rgba(244,239,227,.68));
    }
    .tab.active::after {
      content: "";
      position: absolute;
      left: 22%;
      right: 22%;
      bottom: 0;
      height: 3px;
      background: var(--gold);
      border-radius: 99px 99px 0 0;
    }

    .section-tabs {
      display: inline-flex;
      align-items: stretch;
      gap: 6px;
      padding: 4px;
      border: 1px solid var(--line-soft);
      border-radius: 9px;
      background: rgba(255,255,255,.24);
    }

    .section-tab {
      min-width: 112px;
      min-height: 44px;
      border: 0;
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
      font: inherit;
      text-align: left;
      padding: 7px 13px;
      cursor: pointer;
    }

    .section-tab b {
      display: block;
      color: inherit;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.1;
    }

    .section-tab span {
      display: block;
      margin-top: 3px;
      font-size: 11px;
      line-height: 1.1;
    }

    .section-tab.active {
      color: var(--ink);
      background: linear-gradient(180deg, rgba(255,255,255,.72), rgba(222,203,168,.76));
      box-shadow:
        0 8px 18px rgba(47,41,36,.1),
        inset 0 1px 0 rgba(255,255,255,.7);
    }

    main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      min-height: 0;
    }

    .board {
      padding: 18px 20px 22px;
      overflow: auto;
      background:
        linear-gradient(180deg, rgba(255,255,255,.18), transparent 18%),
        rgba(244, 239, 227, .48);
    }

    .panel-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line-soft);
    }

    .panel-head h2 {
      font-size: 21px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      justify-content: flex-end;
      color: var(--muted);
      font-size: 11px;
    }

    .legend span, .tag {
      border: 1px solid var(--line-soft);
      background: rgba(255,255,255,.32);
      border-radius: 999px;
      padding: 4px 8px;
      white-space: nowrap;
    }

    .view { display: none; }
    .view.active { display: block; }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .rank-lanes {
      display: grid;
      gap: 13px;
    }

    .rank-toolbar {
      display: grid;
      grid-template-columns: auto minmax(240px, 1fr) auto;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .mode-switch {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: rgba(255,255,255,.28);
    }

    .mode-switch button {
      border: 0;
      border-right: 1px solid var(--line-soft);
      background: transparent;
      color: var(--muted);
      min-height: 34px;
      padding: 0 14px;
      font: inherit;
      cursor: pointer;
    }

    .mode-switch button:last-child { border-right: 0; }
    .mode-switch button.active {
      color: var(--ink);
      background: linear-gradient(180deg, #fff8e7, #decba8);
    }

    .tree-tools {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
      justify-self: end;
    }

    .tree-tool {
      width: 32px;
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: linear-gradient(180deg, #f8f4e9, #dfd1b9);
      color: var(--ink);
      font: inherit;
      cursor: pointer;
    }

    .tree-filters {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 0;
    }

    .filter-select {
      min-width: 128px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: linear-gradient(180deg, #f8f4e9, #dfd1b9);
      color: var(--ink);
      padding: 0 10px;
      font: inherit;
    }

    .focus-chip {
      display: none;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line-soft);
      border-radius: 999px;
      background: rgba(255,255,255,.36);
      color: var(--muted);
      padding: 5px 8px;
      font-size: 11px;
      white-space: nowrap;
    }

    .focus-chip.active {
      display: inline-flex;
    }

    .focus-chip button {
      border: 0;
      background: transparent;
      color: var(--ink);
      cursor: pointer;
      font: inherit;
      padding: 0 2px;
    }

    .person-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      margin-left: 2px;
    }

    .person-toggle input {
      margin: 0;
      width: 14px;
      height: 14px;
      accent-color: #7c6132;
    }

    .tree-shell {
      height: clamp(520px, calc(100vh - 210px), 760px);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background:
        linear-gradient(rgba(168,146,116,.13) 1px, transparent 1px),
        linear-gradient(90deg, rgba(168,146,116,.13) 1px, transparent 1px),
        rgba(244, 239, 227, .5);
      background-size: 42px 42px;
      position: relative;
      cursor: grab;
      user-select: none;
      touch-action: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.48);
    }

    .tree-shell.dragging { cursor: grabbing; }

    .tree-world {
      position: absolute;
      left: 0;
      top: 0;
      transform-origin: 0 0;
    }

    .tree-svg {
      position: absolute;
      inset: 0;
      overflow: visible;
      pointer-events: none;
    }

    .tree-edge {
      fill: none;
      stroke: rgba(87, 103, 87, .58);
      stroke-width: 2;
      filter: drop-shadow(0 1px 0 rgba(255,255,255,.58));
    }

    .tree-edge.identity {
      stroke: rgba(132, 75, 69, .62);
      stroke-width: 2.2;
    }

    .tree-edge.dotted {
      stroke-dasharray: 4 6;
    }

    .tree-edge.dashed {
      stroke-dasharray: 8 5;
    }

    .edge-label {
      font-size: 13px;
      font-weight: 650;
      fill: #665648;
      paint-order: stroke;
      stroke: #f6f0e4;
      stroke-width: 5px;
      stroke-linejoin: round;
    }

    .level-rail {
      position: absolute;
      left: 18px;
      top: 0;
      width: 150px;
      bottom: 0;
      border-right: 3px double rgba(168,146,116,.42);
      pointer-events: none;
    }

    .tree-level-label {
      position: absolute;
      left: 0;
      width: 126px;
      transform: translateY(-50%);
      text-align: right;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
    }

    .tree-level-label b {
      display: block;
      color: var(--ink);
      font-size: 16px;
      margin-bottom: 3px;
    }

    .tree-card {
      position: absolute;
      width: 132px;
      min-height: 82px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(255,255,255,.7), rgba(232,222,202,.92));
      box-shadow: 0 10px 20px rgba(47,41,36,.12);
      color: inherit;
      font: inherit;
      text-align: left;
      padding: 9px;
      cursor: pointer;
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
    }

    .tree-card:hover {
      transform: translateY(-2px);
      border-color: var(--gold);
      box-shadow: 0 14px 26px rgba(47,41,36,.18);
    }

    .tree-card.active {
      outline: 2px solid rgba(164,125,53,.5);
      background: linear-gradient(180deg, #fffaf0, #e9dcc2);
    }

    .tree-name {
      min-width: 0;
      font-size: 15px;
      font-weight: 700;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tree-role {
      margin-top: 3px;
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tree-hint {
      position: absolute;
      left: 14px;
      bottom: 12px;
      border: 1px solid var(--line-soft);
      border-radius: 999px;
      background: rgba(255,255,255,.48);
      color: var(--muted);
      padding: 5px 10px;
      font-size: 11px;
      pointer-events: none;
    }

    .rights-stack {
      display: grid;
      gap: 10px;
    }

    .power-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 310px;
      gap: 14px;
    }

    .management-flow {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .flow-step {
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: rgba(255,255,255,.28);
      padding: 11px;
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .flow-step b {
      font-size: 15px;
    }

    .flow-step span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .management-main {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      align-content: start;
      gap: 14px;
      min-width: 0;
    }

    .management-section {
      display: grid;
      gap: 10px;
    }

    .management-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      padding: 0 2px;
    }

    .management-title h3 {
      font-size: 18px;
      font-weight: 700;
    }

    .management-title span {
      color: var(--muted);
      font-size: 12px;
    }

    .management-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      max-height: clamp(440px, calc(100vh - 320px), 620px);
      overflow: auto;
      padding-right: 2px;
    }

    .score-board {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .score-rule-card {
      grid-column: 1 / -1;
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: rgba(255,255,255,.28);
      padding: 12px;
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .score-rule-card h3 {
      color: var(--ink);
      font-size: 16px;
      font-weight: 750;
    }

    .score-card {
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: rgba(255,255,255,.28);
      padding: 11px;
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .score-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
    }

    .score-card b {
      font-size: 14px;
      white-space: nowrap;
    }

    .score-card strong {
      font-size: 19px;
      font-weight: 750;
    }

    .score-bar {
      height: 6px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(47,41,36,.11);
    }

    .score-bar span {
      display: block;
      height: 100%;
      width: var(--score-width, 50%);
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(79,115,95,.82), rgba(164,125,53,.78));
    }

    .score-hint {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }

    .score-card.warmth {
      grid-column: 1 / -1;
      grid-template-columns: minmax(0, 1fr) minmax(220px, .8fr);
      align-items: stretch;
    }

    .score-bottleneck {
      border-left: 1px solid var(--line-soft);
      padding-left: 12px;
      display: grid;
      align-content: center;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .score-bottleneck b {
      color: var(--ink);
      font-size: 12px;
    }

    .transaction-layout {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 14px;
      min-width: 0;
    }

    .transaction-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      align-content: start;
      min-width: 0;
    }

    .transaction-card {
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: rgba(255,255,255,.28);
      padding: 12px;
      display: grid;
      gap: 10px;
      min-width: 0;
      cursor: pointer;
      transition: border-color .16s ease, box-shadow .16s ease, background .16s ease;
    }

    .transaction-card.active {
      border-color: rgba(255,255,255,.78);
      background: rgba(255, 252, 244, .68);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.86),
        0 0 0 5px rgba(126, 174, 151, .12),
        0 0 28px rgba(104, 156, 132, .26),
        0 18px 36px rgba(50,45,39,.12),
        inset 0 1px 0 rgba(255,255,255,.82);
    }

    .transaction-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .transaction-head h3 {
      font-size: 16px;
      font-weight: 750;
      line-height: 1.25;
    }

    .transaction-desc {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .transaction-owners {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-width: 0;
    }

    .owner-chip {
      border: 1px solid rgba(104,156,132,.26);
      border-radius: 999px;
      background: rgba(218,231,220,.34);
      color: var(--ink);
      padding: 4px 8px;
      font-size: 11px;
      line-height: 1.2;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .transaction-metrics {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .person-picker {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(112px, 1fr));
      gap: 6px;
    }

    .person-picker.collapsed {
      grid-template-columns: 1fr;
    }

    .person-chip {
      min-width: 0;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line-soft);
      border-radius: 999px;
      background: rgba(255,255,255,.26);
      color: var(--muted);
      padding: 5px 8px;
      font-size: 11px;
      cursor: pointer;
      user-select: none;
    }

    .person-chip input {
      accent-color: var(--green);
    }

    .person-chip span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .person-chip:has(input:checked) {
      color: var(--ink);
      border-color: rgba(104,156,132,.42);
      background: rgba(218,231,220,.5);
      box-shadow: 0 0 18px rgba(104,156,132,.16);
    }

    .person-chip small {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.2;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .manager-slots,
    .candidate-block {
      display: grid;
      gap: 8px;
    }

    .manager-slots {
      margin-top: 6px;
    }

    .candidate-block h5 {
      font-size: 12px;
      color: var(--ink);
      font-weight: 700;
    }

    .candidate-block summary {
      color: var(--ink);
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      list-style-position: inside;
    }

    .transaction-aside {
      display: grid;
      gap: 10px;
      align-content: start;
      min-width: 0;
    }

    .transaction-note,
    .skill-note {
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: rgba(255,255,255,.28);
      padding: 12px;
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .transaction-note h3,
    .skill-note h3 {
      color: var(--ink);
      font-size: 16px;
      font-weight: 750;
    }

    .skills-layout {
      display: grid;
      gap: 14px;
    }

    .skills-toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: end;
    }

    .skills-toolbar h3 {
      font-size: 18px;
      font-weight: 750;
    }

    .skills-toolbar p {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .story-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 14px;
      align-items: start;
      max-height: clamp(560px, calc(100vh - 250px), 820px);
      overflow: hidden;
    }

    .story-main {
      display: grid;
      gap: 12px;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }

    .story-toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 8px;
      align-items: end;
    }

    .story-select {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .34);
      color: var(--ink);
      min-height: 34px;
      padding: 0 10px;
      font: inherit;
      width: 100%;
    }

    .story-status-grid,
    .story-axes-grid,
    .story-portrait-grid {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .story-status-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .story-card,
    .story-log,
    .story-status-grid,
    .story-axes-grid,
    .story-portrait-grid {
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: rgba(255, 255, 255, .28);
      padding: 10px;
    }

    .story-card h3 {
      margin-bottom: 8px;
      font-size: 17px;
      color: var(--ink);
    }

    .story-meta {
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .story-scene {
      color: var(--muted);
      margin-bottom: 10px;
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .story-vn-card {
      min-height: 0;
      overflow: hidden;
    }

    .story-env {
      border: 1px solid rgba(255, 255, 255, .48);
      border-radius: 8px;
      background: rgba(255, 255, 255, .26);
      padding: 9px 11px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
      margin-bottom: 10px;
    }

    .story-env p + p {
      margin-top: 5px;
    }

    .story-vn-stage {
      display: grid;
      grid-template-columns: 168px minmax(0, 1fr);
      gap: 12px;
      align-items: stretch;
      min-height: 285px;
      margin-bottom: 10px;
    }

    .story-player-panel {
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(255,255,255,.42), rgba(222,203,168,.22));
      padding: 10px;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      gap: 8px;
      min-width: 0;
      overflow: hidden;
    }

    .story-player-portrait {
      min-height: 220px;
      border-radius: 8px;
      border: 1px solid rgba(168, 146, 116, .36);
      background:
        linear-gradient(180deg, rgba(255,255,255,.28), rgba(168,146,116,.16)),
        rgba(244, 239, 227, .58);
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .story-player-portrait img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .story-player-name {
      color: var(--ink);
      font-weight: 750;
      font-size: 14px;
      line-height: 1.2;
    }

    .story-player-name span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-weight: 400;
      font-size: 11px;
    }

    .story-vn-lines {
      display: grid;
      align-content: start;
      gap: 8px;
      min-height: 0;
      max-height: 300px;
      overflow: auto;
      padding-right: 2px;
    }

    .story-vn-line {
      border: 1px solid rgba(168, 146, 116, .28);
      border-radius: 8px;
      background: rgba(255,255,255,.32);
      padding: 9px 10px;
      display: grid;
      gap: 4px;
    }

    .story-vn-line.narrator {
      background: rgba(255,255,255,.22);
      border-style: dashed;
    }

    .story-vn-line.player {
      border-color: rgba(79, 115, 95, .42);
      background: rgba(218, 231, 220, .36);
    }

    .story-vn-speaker {
      color: var(--ink);
      font-size: 12px;
      font-weight: 750;
    }

    .story-vn-text {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .story-choice-list {
      display: grid;
      gap: 8px;
    }

    .story-choice-btn {
      width: 100%;
      min-height: 42px;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .34);
      color: var(--ink);
      font: inherit;
      padding: 9px 10px;
      cursor: pointer;
      display: grid;
      gap: 4px;
    }

    .story-choice-btn:hover {
      background: rgba(255, 255, 255, .48);
    }

    .story-choice-btn:disabled {
      opacity: .5;
      cursor: not-allowed;
      background: rgba(255, 255, 255, .18);
      border-color: rgba(128, 105, 75, .32);
    }

    .story-choice-label {
      font-size: 13px;
      line-height: 1.45;
      color: var(--ink);
      display: block;
    }

    .story-choice-locked {
      color: var(--red);
      font-size: 11px;
      line-height: 1.5;
      display: block;
      word-break: break-word;
      color: var(--red);
    }

    .story-log-entry {
      border-top: 1px solid var(--line-soft);
      padding-top: 7px;
      margin-top: 7px;
      font-size: 12px;
      line-height: 1.45;
      color: var(--muted);
    }

    .story-log-entry:first-child {
      border-top: none;
      margin-top: 0;
      padding-top: 0;
    }

    .story-log-speaker {
      color: var(--ink);
      font-weight: 650;
    }

    .story-side {
      display: grid;
      gap: 10px;
      min-width: 0;
      min-height: 0;
      max-height: 100%;
      overflow: hidden;
    }

    .story-status-pair {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      align-items: start;
    }

    .story-relations-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .story-metrics {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .story-dialogue-lines {
      display: grid;
      gap: 10px;
      margin-top: 8px;
      max-height: 210px;
      overflow: auto;
    }

    .story-dialogue-row {
      display: grid;
      grid-template-columns: 30px minmax(0, 1fr);
      gap: 8px;
      align-items: flex-start;
    }

    .story-dialogue-row:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .story-dialogue-row + .story-dialogue-row {
      border-top: 1px dashed var(--line-soft);
      padding-top: 8px;
    }

    .story-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1px solid rgba(168, 146, 116, .4);
      background: linear-gradient(180deg, #f8f4e9, #e4d8c2);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      line-height: 1;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .56);
      flex-shrink: 0;
    }

    .story-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
    }

    .story-dialogue-speaker {
      display: block;
      color: var(--ink);
      font-size: 11px;
      font-weight: 650;
      margin-bottom: 2px;
    }

    .story-dialogue-text {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .story-dialogue-content {
      min-width: 0;
    }

    .story-attr-head {
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }

    .story-attr-head .avatar {
      width: 58px;
      height: 58px;
      border-radius: 10px;
    }

    .story-attr-name {
      font-size: 20px;
      font-weight: 750;
      color: var(--ink);
      line-height: 1.15;
    }

    .story-attr-sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .view[data-view="story"] {
      max-height: calc(100vh - 250px);
      overflow: hidden;
    }

    .story-side .story-meta-title {
      color: var(--muted);
      margin-bottom: 6px;
      font-size: 12px;
    }

    .story-score-item {
      display: grid;
      gap: 6px;
      padding-bottom: 8px;
      border-bottom: 1px dashed var(--line-soft);
    }

    .story-score-item:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .story-score-title {
      color: var(--muted);
      font-size: 11px;
    }

    .story-meter {
      height: 6px;
      border-radius: 999px;
      background: rgba(47, 41, 36, .14);
      overflow: hidden;
    }

    .story-meter > span {
      display: block;
      width: var(--story-width, 50%);
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(79, 115, 95, .82), rgba(164, 125, 53, .78));
    }

    .story-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }

    .story-tag {
      border: 1px solid var(--line-soft);
      border-radius: 999px;
      background: rgba(255, 255, 255, .38);
      padding: 3px 7px;
      color: var(--muted);
      font-size: 10px;
    }

    .skill-table {
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: rgba(255,255,255,.28);
      overflow: auto;
    }

    .skill-grid {
      min-width: 1080px;
      display: grid;
      grid-template-columns: 190px repeat(9, minmax(72px, 1fr));
    }

    .skill-cell {
      min-height: 48px;
      border-right: 1px solid rgba(168,146,116,.2);
      border-bottom: 1px solid rgba(168,146,116,.2);
      padding: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .skill-cell:nth-child(10n) {
      border-right: 0;
    }

    .skill-head {
      min-height: 38px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      background: rgba(255,255,255,.26);
    }

    .skill-person {
      position: sticky;
      left: 0;
      z-index: 2;
      background: rgba(250,247,239,.74);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      cursor: pointer;
    }

    .skill-person .avatar {
      width: 34px;
      height: 34px;
      flex: 0 0 auto;
    }

    .skill-person b,
    .skill-person span {
      display: block;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .skill-person b {
      color: var(--ink);
      font-size: 13px;
    }

    .skill-person span {
      margin-top: 2px;
      color: var(--muted);
      font-size: 10px;
    }

    .skill-input {
      width: 100%;
      min-width: 0;
      height: 32px;
      border: 1px solid var(--line-soft);
      border-radius: 7px;
      background: rgba(255,255,255,.34);
      color: var(--ink);
      font: inherit;
      text-align: center;
      outline: none;
    }

    .skill-input:focus {
      border-color: rgba(104,156,132,.54);
      box-shadow: 0 0 0 3px rgba(104,156,132,.14);
    }

    .skill-summary {
      display: grid;
      gap: 8px;
    }

    .skill-summary-row {
      display: grid;
      grid-template-columns: minmax(54px, .8fr) minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
    }

    .skill-summary-row b {
      color: var(--ink);
      font-weight: 650;
    }

    .skill-meter {
      height: 6px;
      border-radius: 999px;
      background: rgba(47,41,36,.11);
      overflow: hidden;
    }

    .skill-meter span {
      display: block;
      width: var(--skill-width, 50%);
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(80,111,130,.78), rgba(79,115,95,.78));
    }

    .management-card,
    .action-library {
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: rgba(255,255,255,.28);
      padding: 11px;
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .management-card h4,
    .action-library h3 {
      font-size: 15px;
      font-weight: 700;
    }

    .management-card p,
    .action-library p {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .manager-select {
      width: 100%;
      min-height: 34px;
      border: 1px solid var(--line-soft);
      border-radius: 7px;
      background: rgba(255,255,255,.34);
      color: var(--ink);
      font: inherit;
      padding: 0 9px;
    }

    .action-chip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .power-sidebar,
    .power-column {
      display: grid;
      align-content: start;
      gap: 10px;
    }

    .action-library {
      align-content: start;
      max-height: clamp(520px, calc(100vh - 230px), 720px);
      overflow: auto;
    }

    .power-table {
      display: grid;
      align-content: start;
      gap: 10px;
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: rgba(255,255,255,.28);
      padding: 12px;
      min-width: 0;
    }

    .power-table-head {
      display: grid;
      gap: 4px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--line-soft);
    }

    .power-table-head h3 {
      font-size: 18px;
      font-weight: 700;
    }

    .power-table-head p {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .power-table-body {
      display: grid;
      gap: 8px;
      max-height: clamp(420px, calc(100vh - 275px), 640px);
      overflow: auto;
      padding-right: 2px;
    }

    .power-table-card {
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: rgba(255,255,255,.28);
      padding: 10px;
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .power-card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .power-card-head h4 {
      min-width: 0;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.3;
    }

    .power-card-text {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .power-sidebar {
      border-right: 1px solid var(--line-soft);
      padding-right: 14px;
    }

    .power-mode {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      padding: 4px;
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: rgba(255,255,255,.24);
    }

    .power-mode button,
    .power-list button,
    .power-add-btn {
      border: 1px solid transparent;
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
      font: inherit;
      cursor: pointer;
    }

    .power-mode button {
      min-height: 34px;
    }

    .power-mode button.active,
    .power-list button.active {
      color: var(--ink);
      background: rgba(255,255,255,.48);
      border-color: rgba(255,255,255,.58);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.62);
    }

    .power-list {
      display: grid;
      gap: 6px;
      max-height: clamp(320px, calc(100vh - 330px), 560px);
      overflow: auto;
      padding-right: 2px;
    }

    .power-list button {
      min-height: 42px;
      text-align: left;
      padding: 7px 9px;
    }

    .power-list strong {
      display: block;
      color: inherit;
      font-size: 13px;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .power-list span {
      display: block;
      margin-top: 3px;
      font-size: 10px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .power-add-btn {
      min-height: 36px;
      border-color: var(--line-soft);
      background: rgba(255,255,255,.26);
      color: var(--ink);
    }

    .power-editor {
      display: grid;
      align-content: start;
      gap: 12px;
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: rgba(255,255,255,.28);
      padding: 12px;
    }

    .power-form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .power-field {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .power-field.full {
      grid-column: 1 / -1;
    }

    .power-field label,
    .power-check-title {
      color: var(--muted);
      font-size: 12px;
    }

    .power-input,
    .power-textarea {
      width: 100%;
      border: 1px solid var(--line-soft);
      border-radius: 7px;
      background: rgba(255,255,255,.34);
      color: var(--ink);
      font: inherit;
      padding: 8px 9px;
      outline: none;
    }

    .power-textarea {
      min-height: 74px;
      resize: vertical;
      line-height: 1.45;
    }

    .power-input:focus,
    .power-textarea:focus {
      border-color: rgba(104,156,132,.54);
      box-shadow: 0 0 0 3px rgba(104,156,132,.14);
    }

    .power-checks {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .power-checks.compact {
      gap: 5px;
    }

    .power-checks.compact .power-check {
      padding: 4px 7px;
      font-size: 11px;
    }

    .power-check {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line-soft);
      border-radius: 999px;
      background: rgba(255,255,255,.28);
      color: var(--muted);
      padding: 6px 9px;
      font-size: 12px;
      cursor: pointer;
      user-select: none;
    }

    .power-check input {
      accent-color: var(--green);
    }

    .power-check:has(input:checked) {
      color: var(--ink);
      border-color: rgba(104,156,132,.42);
      background: rgba(218,231,220,.52);
    }

    .power-custom {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
    }

    .power-column-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      padding: 0 2px 2px;
      color: var(--muted);
      font-size: 12px;
    }

    .power-column-title h3 {
      color: var(--ink);
      font-size: 18px;
      font-weight: 700;
    }

    .power-row {
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: rgba(255,255,255,.28);
      box-shadow: 0 8px 20px rgba(47,41,36,.08);
      padding: 11px;
      display: grid;
      gap: 8px;
    }

    .power-row-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .power-row h4 {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.25;
    }

    .power-row p {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .power-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .rights-card {
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: rgba(255,255,255,.28);
      padding: 10px;
    }

    .rights-card.active {
      border-color: var(--gold);
      background: rgba(255,248,231,.58);
    }

    .rights-title {
      display: flex;

        const part = String(sentences[i] || '').trim();
        if (!part) continue;
        if ('。！？!?,;；，\n'.includes(part)) {
          if (rows.length) {
            rows[rows.length - 1] += part;
          }
          continue;
        }
        rows.push(part);
      }
      if (!rows.length && normalized) rows.push(normalized);
      return rows;
    }

    async function ensureStoryOriginalLoaded() {
      if (storyOriginal.loaded || storyOriginal.loading) return storyOriginalLoadTask;
      storyOriginal.loading = true;
      storyOriginal.loadingMessage = '读取红楼原文中...';
      storyOriginalLoadTask = (async () => {
        try {
          if (window.location.protocol === 'file:') {
            throw new Error('file 模式下直接使用剧情节点内嵌原文');
          }
          const [quoteRes, scenesRes] = await Promise.all([
            fetch(STORY_ORIGINAL_FILES.quotes),
            fetch(STORY_ORIGINAL_FILES.scenes),
          ]);
          if (!quoteRes.ok) throw new Error(`all_quotes 读取失败：${quoteRes.status}`);
          if (!scenesRes.ok) throw new Error(`all_conversation_scenes 读取失败：${scenesRes.status}`);

          const quoteText = await quoteRes.text();
          const lines = quoteText.split('\n');
          storyOriginal.byChapter = new Map();
          storyOriginal.bySourceChapter = new Map();
          lines.forEach(line => {
            const text = String(line || '').trim();
            if (!text) return;
            try {
              const row = JSON.parse(text);
              const chapterId = String(row.chapter_id || '').trim();
              if (!chapterId) return;
              const sourceScenePrefix = chapterId.split('_')[0];
              if (sourceScenePrefix) {
                const chapterBucket = storyOriginal.bySourceChapter.get(sourceScenePrefix) || [];
                chapterBucket.push(row);
                storyOriginal.bySourceChapter.set(sourceScenePrefix, chapterBucket);
              }
              const bucket = storyOriginal.byChapter.get(chapterId) || [];
              bucket.push(row);
              storyOriginal.byChapter.set(chapterId, bucket);
            } catch (error) {
              // ignore malformed lines in jsonl
            }
          });

          const scenesRaw = await scenesRes.json();
          storyOriginal.sceneTitleById = new Map();
          (scenesRaw || []).forEach(item => {
            if (!item?.scene_id) return;
            storyOriginal.sceneTitleById.set(String(item.scene_id), String(item.title || '').trim() || String(item.scene_id));
          });

          storyOriginal.loaded = true;
          storyOriginal.loading = false;
          storyOriginal.loadingMessage = '';
          storyOriginal.failed = false;
        } catch (error) {
          storyOriginal.loading = false;
          storyOriginal.loaded = false;
          storyOriginal.failed = true;
          storyOriginal.loadingMessage = error?.message || '原文资源加载失败';
          storyOriginal.byChapter = new Map();
          storyOriginal.bySourceChapter = new Map();
          storyOriginal.sceneTitleById = new Map();
        }
      })();
      return storyOriginalLoadTask;
    }

    function getStoryChapterQuotes(chapterId = '') {
      const direct = storyOriginal.byChapter.get(chapterId) || [];
      if (direct.length) return direct;

    function getStoryChapterSceneTitle(node, chapter) {
      const scenes = (chapter?.sourceSceneIds || []).map(sceneId => storyOriginal.sceneTitleById.get(sceneId) || sceneId).filter(Boolean);
      if (!scenes.length) return '';
      const nodeList = chapter?.nodes || [];
      const idx = Math.max(0, nodeList.findIndex(item => item?.nodeId === node?.nodeId));
      const sceneIndex = clampNumber(Math.floor((idx / Math.max(1, nodeList.length)) * scenes.length), 0, scenes.length - 1);
      return scenes[sceneIndex] || scenes[0];
    }

    function getStoryOriginalDialogue(node, chapter) {
      const chapterId = chapter?.chapterId;
      const quotes = getStoryChapterQuotes(chapterId).filter(item => String(item.type || '').toLowerCase() !== 'stage');
      if (!quotes.length) return [];
      const nodeList = chapter?.nodes || [];
      const nodeIndex = Math.max(0, nodeList.findIndex(item => item?.nodeId === node?.nodeId));
      const blockSize = Math.max(1, Math.ceil(quotes.length / Math.max(1, nodeList.length)));
      const start = Math.max(0, nodeIndex * blockSize - 1);
      const end = Math.min(quotes.length, start + blockSize + 2);
      return quotes.slice(start, end);
    }

    function storyRelationAxisModel(targetId, axis) {
      if (!targetId) return { value: 0, percent: 50, source: 'fallback' };
      if (typeof getRelationAxis === 'function') {
        const raw = Number(getRelationAxis(storyPlayerId, targetId, axis));
        if (Number.isFinite(raw)) {
          return { value: clampNumber(raw, -100, 100), percent: clampNumber((raw + 100) / 2, 0, 100), source: 'main' };
        }
      }
      if (typeof getRelationInfo === 'function') {
        const info = getRelationInfo(storyPlayerId, targetId) || {};
        const key = axis === 'submission' ? 'submissionAtoB' : axis;
        const raw = Number(info[key]);
        if (Number.isFinite(raw)) {
          return { value: clampNumber(raw, -100, 100), percent: clampNumber((raw + 100) / 2, 0, 100), source: 'main' };
        }
      }
      const runtimeRelation = window.relations?.[storyRelKey(storyPlayerId, targetId)];
      if (runtimeRelation) {
        const raw = axis === 'submission'
          ? Number(runtimeRelation.submission?.[storyPlayerId] ?? 0)
          : Number(runtimeRelation[axis] ?? 0);
        if (Number.isFinite(raw)) {
          return { value: clampNumber(raw, -100, 100), percent: clampNumber((raw + 100) / 2, 0, 100), source: 'main' };
        }
      }
      const fallback = storyState.relations?.[targetId] || {};
      const rawFallback = axis === 'submission' ? Number(fallback.submission?.[storyPlayerId] ?? 0) : Number(fallback[axis] ?? 50);
      const value = Number.isFinite(rawFallback) ? rawFallback : 50;
      return { value: clampNumber(value, -100, 100), percent: clampNumber(value, 0, 100), source: 'story' };
    }

      [idsForYardFilter(activeYardFilter), idsForAffairFilter(activeAffairFilter)].forEach(filterSet => {

    function visibleTreeData(tree) {

      Object.entries(tree.nodes || {}).forEach(([id, node]) => {
        if (!showAllPeople && !visiblePersons.has(id)) return;
        filteredNodes[id] = node;
      });
      const filteredEdges = (tree.edges || []).filter(edge => filteredNodes[edge.from] && filteredNodes[edge.to]);
      return {
        nodes: filteredNodes,
        edges: filteredEdges,
      };
    }

      return !!focusedPersonId && (edge.from === focusedPersonId || edge.to === focusedPersonId);
    }

    function focusedNode(id, edges) {
      if (!focusedPersonId) return false;
      if (id === focusedPersonId) return true;
      return (edges || []).some(edge => focusedEdge(edge) && (edge.from === id || edge.to === id));
    }

    function filteredEdge(edge, filterIds) {
      return hasActiveTreeFilter() && filterIds && (filterIds.has(edge.from) || filterIds.has(edge.to));
    }

    function filteredNode(id, edges, filterIds) {
      if (!hasActiveTreeFilter() || !filterIds) return false;
      if (filterIds.has(id)) return true;
      return (edges || []).some(edge => filteredEdge(edge, filterIds) && (edge.from === id || edge.to === id));
    }

    function relatedEdge(edge, filterIds) {
      return focusedEdge(edge) || filteredEdge(edge, filterIds);
    }

    function relatedNode(id, edges, filterIds) {
      return focusedNode(id, edges) || filteredNode(id, edges, filterIds);
    }

    function renderFocusChip() {
      const chip = document.getElementById('focus-chip');
      const label = document.getElementById('focus-label');
      if (!chip || !label) return;
      const person = focusedPersonId ? people[focusedPersonId] : null;
      chip.classList.toggle('active', !!person);
      label.textContent = person ? `聚焦：${person.name}` : '';
    }

    function treeAvatarHtml(person) {
      const src = person?.avatar;
      const initial = (person?.name || person?.id || '人').slice(0, 1);
      return `<div class="avatar">${src ? `<img src="${esc(src)}" alt="${esc(person.name)}">` : esc(initial)}</div>`;
    }

    function treeNodeHtml(node, edges = [], filterIds = null) {
      const p = people[node.id] || { id: node.id, name: node.id, role: '' };
      const active = selected.type === 'person' && selected.id === node.id ? ' active' : '';
      const isRelated = relatedNode(node.id, edges, filterIds);
      const related = isRelated ? ' related' : '';
      const dimmed = hasActiveTreeContext() && !isRelated ? ' dimmed' : '';
      const external = node.external ? ' external' : '';
      const role = rankMode === 'identity'
        ? `${node.familyRole || p.rank || ''} · ${identityLevelRights.find(x => x.level === node.rank)?.label || p.rank || ''}`
        : `${node.level || p.rank || ''} · ${p.yard || ''}`;
      return `<button class="tree-card${external}${active}${related}${dimmed}" type="button" data-person="${esc(node.id)}" style="left:${node.x}px;top:${node.y}px">
        ${treeAvatarHtml(p)}
        <div>
          <div class="tree-name">${esc(p.name)}</div>
          <div class="tree-role">${esc(role)}</div>
        </div>
      </button>`;
    }

    function edgeGeometry(from, to) {
      const cardW = 132;
      const cardH = 82;
      const fromCx = from.x + cardW / 2;
      const fromCy = from.y + cardH / 2;
      const toCx = to.x + cardW / 2;
      const toCy = to.y + cardH / 2;
      const dx = toCx - fromCx;
      const dy = toCy - fromCy;
      if (Math.abs(dx) > 88 && Math.abs(dx) > Math.abs(dy) * 1.15) {
        const dir = dx >= 0 ? 1 : -1;
        const startX = fromCx + dir * cardW / 2;
        const startY = fromCy;
        const endX = toCx - dir * cardW / 2;
        const endY = toCy;
        const gap = Math.max(1, Math.abs(endX - startX));
        const pull = Math.max(26, Math.min(72, gap * .42));
        return {
          path: `M ${startX} ${startY} C ${startX + dir * pull} ${startY}, ${endX - dir * pull} ${endY}, ${endX} ${endY}`,
          label: { x: (startX + endX) / 2, y: (startY + endY) / 2 - 10 }
        };
      }
      const dirY = dy >= 0 ? 1 : -1;
      const startX = fromCx;
      const startY = fromCy + dirY * cardH / 2;
      const endX = toCx;
      const endY = toCy - dirY * cardH / 2;
      const pull = Math.max(34, Math.abs(dy) * .38);
      return {
        path: `M ${startX} ${startY} C ${startX} ${startY + dirY * pull}, ${endX} ${endY - dirY * pull}, ${endX} ${endY}`,
        label: { x: (startX + endX) / 2, y: (startY + endY) / 2 - 8 }
      };
    }

    function edgePath(from, to) {
      return edgeGeometry(from, to).path;
    }

    function edgeLabelPoint(from, to) {
      return edgeGeometry(from, to).label;
    }

    function renderTreeEdges(tree, mode, filterIds = null) {
      const nodes = tree.nodes || {};
      const marker = mode === 'identity'
        ? `<defs><marker id="tree-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="context-stroke"></path></marker></defs>`
        : '';
      const edges = (tree.edges || []).map((edge, index) => {
        const from = nodes[edge.from];
        const to = nodes[edge.to];
        if (!from || !to) return '';
        const point = edgeLabelPoint(from, to);
        const path = edgePath(from, to);
        const isRelated = relatedEdge(edge, filterIds);
        const related = isRelated ? ' related' : '';
        const dimmed = hasActiveTreeContext() && !isRelated ? ' dimmed' : '';
        const label = mode === 'kinship' && edge.label
          ? `<text class="edge-label${related}${dimmed}" x="${point.x}" y="${point.y}" text-anchor="middle">${esc(edge.label)}</text>`
          : '';
        const markerEnd = mode === 'identity' ? ' marker-end="url(#tree-arrow)"' : '';
        return `<path class="tree-edge ${esc(mode)} ${esc(edge.style || '')}${related}${dimmed}" d="${path}"${markerEnd}></path>${label}`;
      }).join('');
      return `<svg class="tree-svg" width="${tree.size.width}" height="${tree.size.height}" viewBox="0 0 ${tree.size.width} ${tree.size.height}">${marker}${edges}</svg>`;
    }

    function kinshipLevelLabels(tree) {
      const rows = new Map();
      Object.values(tree.nodes || {}).forEach(node => {
        if (!node.level) return;
        const current = rows.get(node.level);
        rows.set(node.level, current == null ? node.y + 42 : Math.min(current, node.y + 42));
      });
      return Array.from(rows.entries()).map(([label, y]) => ({ label, y })).sort((a, b) => a.y - b.y);
    }

    function renderLevelRail(tree, mode) {
      const rows = mode === 'identity'
        ? (tree.levels || []).map(row => ({ label: row.label, sub: `socialRank ${row.key}`, y: row.y + 42 }))
        : kinshipLevelLabels(tree).map(row => ({ label: row.label, sub: '关系名分', y: row.y }));
      return `<div class="level-rail">${rows.map(row => `<div class="tree-level-label" style="top:${row.y}px"><b>${esc(row.label)}</b>${esc(row.sub)}</div>`).join('')}</div>`;
    }

    function applyTreeTransform() {
      const world = document.querySelector('#rank-tree .tree-world');
      const label = document.getElementById('tree-zoom-label');
      if (!world) return;
      const t = treeTransform[rankMode];
      world.style.transform = `translate(${t.x}px, ${t.y}px) scale(${t.scale})`;
      if (label) label.textContent = `${Math.round(t.scale * 100)}%`;
    }

    function zoomTree(delta, originX, originY) {
      const shell = document.getElementById('rank-tree');
      const t = treeTransform[rankMode];
      const next = Math.max(.46, Math.min(1.48, t.scale + delta));
      const rect = shell.getBoundingClientRect();
      const ox = originX == null ? rect.width / 2 : originX - rect.left;
      const oy = originY == null ? rect.height / 2 : originY - rect.top;
      const worldX = (ox - t.x) / t.scale;
      const worldY = (oy - t.y) / t.scale;
      t.x = ox - worldX * next;
      t.y = oy - worldY * next;
      t.scale = next;
      applyTreeTransform();
    }

    function resetTreeTransform() {
      treeTransform.kinship = defaultTreeTransform('kinship');
      treeTransform.identity = defaultTreeTransform('identity');
      applyTreeTransform();
    }

    function fitTreeToVisibleNodes(nodes) {
      const shell = document.getElementById('rank-tree');
      const values = Object.values(nodes || {});
      if (!shell || !values.length) return;
      const minX = Math.min(...values.map(node => node.x));
      const maxX = Math.max(...values.map(node => node.x + 132));
      const minY = Math.min(...values.map(node => node.y));
      const maxY = Math.max(...values.map(node => node.y + 82));
      const width = Math.max(1, maxX - minX);
      const height = Math.max(1, maxY - minY);
      const mini = document.body.classList.contains('mini-order');
      const pad = mini ? 24 : 44;
      const maxScale = mini ? 1.24 : .96;
      const nextScale = Math.max(.5, Math.min(maxScale, (shell.clientWidth - pad * 2) / width, (shell.clientHeight - pad * 2) / height));
      const t = treeTransform[rankMode];
      t.scale = nextScale;
      t.x = (shell.clientWidth - width * nextScale) / 2 - minX * nextScale;
      t.y = (shell.clientHeight - height * nextScale) / 2 - minY * nextScale;
    }

    function bindTreePan() {
      const shell = document.getElementById('rank-tree');
      if (!shell) return;
      let drag = null;
      shell.onpointerdown = event => {
        if (event.target.closest('.tree-card') || event.target.closest('button')) return;
        shell.setPointerCapture(event.pointerId);
        const t = treeTransform[rankMode];
        drag = { pointerId: event.pointerId, startX: event.clientX, startY: event.clientY, x: t.x, y: t.y };
        shell.classList.add('dragging');
      };
      shell.onpointermove = event => {
        if (!drag) return;
        const t = treeTransform[rankMode];
        t.x = drag.x + event.clientX - drag.startX;
        t.y = drag.y + event.clientY - drag.startY;
        applyTreeTransform();
      };
      shell.onpointerup = event => {
        if (!drag || event.pointerId !== drag.pointerId) return;
        drag = null;
        shell.classList.remove('dragging');
      };
      shell.onpointercancel = () => {
        drag = null;
        shell.classList.remove('dragging');
      };
      shell.onwheel = event => {
        event.preventDefault();
        zoomTree(event.deltaY > 0 ? -.08 : .08, event.clientX, event.clientY);
      };
    }

    function personNode(id) {
      const p = people[id];
      const position = positionForPerson(id);
      const active = selected.type === 'person' && selected.id === id ? ' active' : '';
      return `<button type="button" class="person-node${active}" data-person="${esc(id)}" data-kind="${esc(p.kind)}">
        <div class="node-top">
          ${avatarHtml(p)}
          <div>
            <div class="node-name">${esc(p.name)}</div>
            <div class="node-role">${esc(p.role)}</div>
          </div>
        </div>
        <div class="node-meta">
          <span class="mini-tag">${esc(position?.label || p.rank)}</span>
          <span class="mini-tag">${esc(p.yard)}</span>
          <span class="mini-tag">权 ${position?.rights?.length || 0}</span>
        </div>
      </button>`;
    }

    function buildMiniTreeLayout(tree, nodes, edges, mode) {
      const ids = Object.keys(nodes || {});
      if (!ids.length) return { ...tree, nodes, edges };
      const focusId = focusedPersonId && nodes[focusedPersonId] ? focusedPersonId : ids[0];
      const focusNode = nodes[focusId];
      const rowKey = node => mode === 'identity'
        ? Number(node.rank ?? 9)
        : String(node.level || node.y || '一层');
      const sourceRows = new Map();
      ids.forEach(id => {
        const node = nodes[id];
        const key = rowKey(node);
        const current = sourceRows.get(key) || { key, ids: [], y: node.y || 0 };
        current.ids.push(id);
        current.y = Math.min(current.y, node.y || 0);
        sourceRows.set(key, current);
      });
      const rows = Array.from(sourceRows.values()).sort((a, b) => {
        const an = Number(a.key);
        const bn = Number(b.key);
        if (Number.isFinite(an) && Number.isFinite(bn)) return an - bn;
        return a.y - b.y;
      });
      const size = { width: 520, height: Math.max(220, rows.length * 96 + 36) };
      const laidOut = {};
      rows.forEach((row, rowIndex) => {
        const sortedIds = [...row.ids].sort((a, b) => {
          if (a === focusId) return -1;
          if (b === focusId) return 1;
          return (nodes[a].x || 0) - (nodes[b].x || 0);
        });
        const y = 18 + rowIndex * 96;
        const gap = size.width / (sortedIds.length + 1);
        sortedIds.forEach((id, index) => {
          const preferredCenter = id === focusId && sortedIds.length > 1
            ? size.width / 2
            : gap * (index + 1);
          const usedCenters = new Set(Object.values(laidOut).filter(n => Math.abs(n.y - y) < 2).map(n => Math.round(n.x + 66)));
          let center = preferredCenter;
          while (usedCenters.has(Math.round(center))) center += 80;
          center = Math.max(82, Math.min(size.width - 82, center));
          laidOut[id] = { ...nodes[id], x: center - 66, y };
        });
      });
      if (focusNode && laidOut[focusId]) {
        const focusRowY = laidOut[focusId].y;
        const sameRow = Object.entries(laidOut).filter(([, node]) => Math.abs(node.y - focusRowY) < 2);
        if (sameRow.length === 1) laidOut[focusId].x = size.width / 2 - 66;
      }
      return { ...tree, size, nodes: laidOut, edges };
    }

    function renderRank() {
      const tree = treeDefs[rankMode] || treeDefs.kinship;
      const shell = document.getElementById('rank-tree');
      if (!tree || !shell) return;
      populateFilters();
      document.querySelectorAll('[data-rank-mode]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.rankMode === rankMode);
      });
      const visible = visibleTreeData(tree);
      const mini = document.body.classList.contains('mini-order');
      const miniEdges = mini && focusedPersonId
        ? visible.edges.filter(edge => focusedEdge(edge))
        : visible.edges;
      const miniNodeIds = new Set([focusedPersonId]);
      miniEdges.forEach(edge => { miniNodeIds.add(edge.from); miniNodeIds.add(edge.to); });
      const miniNodes = mini && focusedPersonId
        ? Object.fromEntries(Object.entries(visible.nodes).filter(([id]) => miniNodeIds.has(id)))
        : visible.nodes;
      const renderTree = mini && focusedPersonId
        ? buildMiniTreeLayout(tree, miniNodes, miniEdges, rankMode)
        : { ...tree, nodes: miniNodes, edges: miniEdges };
      const filterIds = filteredTreeIds(renderTree);
      shell.innerHTML = `<div class="tree-world" style="width:${renderTree.size.width}px;height:${renderTree.size.height}px">
        ${renderTreeEdges(renderTree, rankMode, filterIds)}
        ${renderLevelRail(renderTree, rankMode)}
        ${Object.values(renderTree.nodes || {}).map(node => treeNodeHtml(node, renderTree.edges, filterIds)).join('')}
      </div>
      <div class="tree-hint">拖拽移动 · 滚轮缩放 · 点击头像聚焦 · 点“全部”恢复</div>`;
      if (focusedPersonId) {
        const relatedNodes = {};
        Object.entries(renderTree.nodes || {}).forEach(([id, node]) => {
          if (focusedNode(id, renderTree.edges)) relatedNodes[id] = node;
        });
        fitTreeToVisibleNodes(relatedNodes);
      }
      applyTreeTransform();
      bindTreePan();
      renderFocusChip();
    }

    function renderYards() {
      document.getElementById('yard-view').innerHTML = yards.map(yard => {

    function renderAffairs() {
      document.getElementById('affair-view').innerHTML = affairs.map(affair => {
        const active = selected.type === 'affair' && selected.id === affair.id ? ' active' : '';
        const visiblePeople = filterPersonIds(affair.people).filter(id => people[id]).map(personNode).join('');
        const visibleTags = filterPersonIds(affair.people).map(id => `<span class="mini-tag">${esc(people[id]?.name || id)}</span>`);
        return `<section class="affair-column">
          <div class="column-title"><h3>${esc(affair.name)}</h3><span>${esc(affair.lead)}</span></div>
          <div class="stack">

              <div class="node-title">${esc(affair.name)}</div>

            ${visiblePeople}
          </div>
        </section>`;
      }).join('');
    }

    function rightLabel(id) {
      return powerConfig.rights.find(right => right.id === id)?.label || id;
    }

    function clampNumber(value, min = 0, max = 100) {
      return Math.max(min, Math.min(max, Number.isFinite(value) ? value : min));
    }

    function average(values) {
      const usable = values.filter(value => Number.isFinite(value));
      if (!usable.length) return 0;
      return usable.reduce((sum, value) => sum + value, 0) / usable.length;
    }

    function assignedManagers(affair) {
      return filterPersonIds(allAssignedManagers(affair));
    }

    function allAssignedManagers(affair) {
      return (affair.managerIds || []).filter(id => people[id]);
    }

    function skillValue(personId, skillId) {
      return clampNumber(personSkillConfig[personId]?.[skillId] ?? 50);
    }

    function weightedSkillScore(personId, weights) {
      const entries = Object.entries(weights || {});
      const totalWeight = entries.reduce((sum, [, weight]) => sum + weight, 0) || 1;
      return entries.reduce((sum, [skillId, weight]) => sum + skillValue(personId, skillId) * weight, 0) / totalWeight;
    }

    function roleFitBonus(personId, affairId) {
      const sourceAffair = affairs.find(row => row.id === affairId);
      const person = people[personId];
      let bonus = sourceAffair?.people?.includes(personId) ? 4 : 0;
      if (person?.kind === 'manager') bonus += 2;
      if (person?.kind === 'elder' && ['ritual', 'study'].includes(affairId)) bonus += 2;
      if (person?.kind === 'servant' && ['service', 'cleaning', 'gate'].includes(affairId)) bonus += 2;
      if (person?.yard && sourceAffair?.scope?.includes(person.yard)) bonus += 1;
      return bonus;
    }

    function affairQuality(affair) {
      const ids = assignedManagers(affair);
      if (!ids.length) return 0;
      const scores = ids.map(id => weightedSkillScore(id, affair.skillWeights) + roleFitBonus(id, affair.id));
      const coordinationPenalty = Math.max(0, ids.length - 3) * 1.5;
      return Math.round(clampNumber(average(scores) - coordinationPenalty));
    }

    function affairDeltas(affair) {
      const quality = affairQuality(affair);
      const ids = assignedManagers(affair);
      const force = (quality - 55) / 8;
      const coverage = Math.max(0, Math.min(3, ids.length) - 1) * .45;
      return {
        order: (affair.base.order || 0) + force * .9 + coverage,
        morale: (affair.base.morale || 0) + force * .55 - Math.max(0, ids.length - 3) * .45,
        dignity: (affair.base.dignity || 0) + force * .65,
        corruption: (affair.base.corruption || 0) - force * .25 + (affair.id === 'account' ? .8 : 0),
      };
    }

    function calculateRawGlobalScores() {
      const raw = { order: 50, morale: 50, dignity: 50, corruption: 50, warmth: 50 };
      powerConfig.affairs.forEach(affair => {
        const deltas = affairDeltas(affair);
        raw.order += deltas.order;
        raw.morale += deltas.morale;
        raw.dignity += deltas.dignity;
        raw.corruption += deltas.corruption;
      });
      raw.order = Math.round(clampNumber(raw.order));
      raw.morale = Math.round(clampNumber(raw.morale));
      raw.dignity = Math.round(clampNumber(raw.dignity));
      raw.corruption = Math.round(clampNumber(raw.corruption));
      raw.affinity = 50;
      raw.warmth = Math.round((raw.order + raw.morale + raw.dignity + raw.corruption + raw.affinity) / 5);
      return raw;
    }

    function calculateGlobalScores() {
      const raw = calculateRawGlobalScores();
      return globalScoreDefs.map(score => ({
        ...score,
        value: raw[score.id],
      }));
    }

    function signedNumber(value) {
      const rounded = Math.round(value * 10) / 10;
      return `${rounded > 0 ? '+' : ''}${rounded}`;
    }

    function renderCalculationRules() {
      return `<section class="score-rule-card">
        <h3>计算规则</h3>
        <span>每个事务先读取 1-5 个负责人的技能加权平均，再叠加身份与事务适配度，得到该事务的管理质量。</span>
        <span>管理质量会实时影响法度、人心、体面、腐败。家族温情 = （法度 + 人心 + 体面 + 腐败 + 情分 50）/ 5；情分后续接人物关系网。</span>
      </section>`;
    }

    function renderWarmthBottleneck() {
      const ranked = powerConfig.affairs
        .map(affair => ({ affair, quality: affairQuality(affair) }))
        .sort((a, b) => b.quality - a.quality);
      const strongest = ranked[0];
      const weakest = ranked[ranked.length - 1];
      return `<div class="score-bottleneck">
        <b>当前瓶颈</b>
        <span>最强：${esc(strongest?.affair.name || '')}，管理质量 ${esc(strongest?.quality ?? 0)}</span>
        <span>最弱：${esc(weakest?.affair.name || '')}，管理质量 ${esc(weakest?.quality ?? 0)}</span>
      </div>`;
    }

    function renderScoreBoard() {
      const scores = calculateGlobalScores();
      const normalScores = scores.filter(score => score.id !== 'warmth');
      const warmth = scores.find(score => score.id === 'warmth');
      return `<section class="score-board" aria-label="全局分">
        ${renderCalculationRules()}
        ${normalScores.map(score => `<article class="score-card">
          <div class="score-card-head"><b>${esc(score.label)}</b><strong>${esc(score.value)}</strong></div>
          <div class="score-bar" style="--score-width:${esc(score.value)}%"><span></span></div>
          <div class="score-hint">${esc(score.hint)}</div>
        </article>`).join('')}
        <article class="score-card warmth">
          <div>
            <div class="score-card-head"><b>${esc(warmth.label)}</b><strong>${esc(warmth.value)}</strong></div>
            <div class="score-bar" style="--score-width:${esc(warmth.value)}%"><span></span></div>
            <div class="score-hint">${esc(warmth.hint)} · 公式：(${esc(normalScores.map(score => score.value).join(' + '))} + 情分 50) / 5</div>
          </div>
          ${renderWarmthBottleneck()}
        </article>
      </section>`;
    }

    function managerCandidates(affair) {
      const chosen = new Set(assignedManagers(affair));
      return Object.values(people)
        .filter(isPersonVisible)
        .map(person => {
          const score = weightedSkillScore(person.id, affair.skillWeights) + roleFitBonus(person.id, affair.id);
          const position = positionForPerson(person.id);
          return {
            person,
            score: Math.round(score),
            chosen: chosen.has(person.id),
            reason: `${position?.label || person.rank} · ${person.yard}`,
          };
        })
        .sort((a, b) => b.score - a.score);
    }

    function renderManagerChip(row, affair) {
