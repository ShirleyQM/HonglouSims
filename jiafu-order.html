    function storyStateLogLine(speaker, text, tone = 'system') {
      if (!storyState?.logs) storyState.logs = [];
      const line = { speaker, text, tone };
      storyState.logs.unshift(line);
      if (storyState.logs.length > 14) storyState.logs.length = 14;
    }

    function storySeedLog() {
      storyState.logs = [];
      const chapter = getCurrentStoryChapter();
      const node = getCurrentStoryNode();
      if (chapter && node) {
        storyState.logs.push({ speaker: '系统', text: `开始：${chapter.title} · ${node.title}` });
      if (chapter.objective) {
        storyState.logs.push({ speaker: '系统', text: `目标：${chapter.objective}` });
      }
      }
      storyState.lastChoice = null;
      storyState.lastNpcLine = null;
      storyState.currentEndingId = '';
    }

    function storyRequirementStatus(req) {
      if (req.type === 'skill') {
        const current = Number(storyState.skills?.[req.id] ?? 0);
        if (Number.isFinite(req.gte)) return current >= req.gte;
        if (Number.isFinite(req.lte)) return current <= req.lte;
        if (Number.isFinite(req.gt)) return current > req.gt;
        if (Number.isFinite(req.lt)) return current < req.lt;
        return false;
      }
      if (req.type === 'storyFlag') {
        const expected = req.value === undefined ? true : Boolean(req.value);
        return Boolean(storyState.storyFlags?.[req.id]) === expected;
      }
      if (req.type === 'trait') return storyState.traits.has(req.id);
      if (req.type === 'traitState') {
        const value = Number(storyState.traitState?.[req.id] ?? 0);
        if (Number.isFinite(req.gte)) return value >= req.gte;
        if (Number.isFinite(req.lte)) return value <= req.lte;
        if (Number.isFinite(req.gt)) return value > req.gt;
        if (Number.isFinite(req.lt)) return value < req.lt;
        return false;
      }
      if (req.type === 'relation') {
        const axis = req.axis || 'trust';
        const value = getStoryRelationValue(req.targetId, axis);
        if (Number.isFinite(req.gte)) return value >= req.gte;
        if (Number.isFinite(req.lte)) return value <= req.lte;
        if (Number.isFinite(req.gt)) return value > req.gt;
        if (Number.isFinite(req.lt)) return value < req.lt;
        return false;
      }
      if (req.type === 'specialty') return storyState.specialties.has(req.id);
      return false;
    }

    function storyRequirementText(req) {
      if (req.type === 'skill') {
        const value = Number(storyState.skills?.[req.id] ?? 0);
        if (Number.isFinite(req.gte)) return `你需要${storyAxisText(req.id)}大于等于 ${req.gte}（当前 ${Math.round(value)}）`;
        if (Number.isFinite(req.lte)) return `你需要${storyAxisText(req.id)}小于等于 ${req.lte}（当前 ${Math.round(value)}）`;
        if (Number.isFinite(req.gt)) return `你需要${storyAxisText(req.id)}高于 ${req.gt}（当前 ${Math.round(value)}）`;
        if (Number.isFinite(req.lt)) return `你需要${storyAxisText(req.id)}低于 ${req.lt}（当前 ${Math.round(value)}）`;
      }
      if (req.type === 'storyFlag') return `${req.id} 需要为 ${req.value ? '开启' : '关闭'}`;
      if (req.type === 'trait') return `需有性格「${storyTraitLabel(req.id)}」`;
      if (req.type === 'traitState') {
        const value = Math.round(Number(storyState.traitState?.[req.id] ?? 0));
        const name = storyTraitStateLabel(req.id);
        if (Number.isFinite(req.gte)) return `${name} 不低于 ${req.gte}（当前 ${value}）`;
        if (Number.isFinite(req.lte)) return `${name} 不高于 ${req.lte}（当前 ${value}）`;
        if (Number.isFinite(req.gt)) return `${name} 高于 ${req.gt}（当前 ${value}）`;
        if (Number.isFinite(req.lt)) return `${name} 低于 ${req.lt}（当前 ${value}）`;
      }
      if (req.type === 'relation') {
        const axis = req.axis || 'trust';
        const value = Math.round(getStoryRelationValue(req.targetId, axis));
        if (Number.isFinite(req.gte)) return `${storyRelationName(req.targetId)}的${storyAxisText(axis)}${req.gte}（当前 ${value}）`;
        if (Number.isFinite(req.lte)) return `${storyRelationName(req.targetId)}的${storyAxisText(axis)}不高于${req.lte}（当前 ${value}）`;
        if (Number.isFinite(req.gt)) return `${storyRelationName(req.targetId)}的${storyAxisText(axis)}高于 ${req.gt}（当前 ${value}）`;
        if (Number.isFinite(req.lt)) return `${storyRelationName(req.targetId)}的${storyAxisText(axis)}低于 ${req.lt}（当前 ${value}）`;
      }
      if (req.type === 'specialty') return `需有专长「${storySpecialtyLabel(req.id)}」`;
      return '未满足条件';
    }

    function storyChoiceLockedReasons(choice) {
      const reasons = [];
      (choice.requires || []).forEach(req => {
        if (!storyRequirementStatus(req)) {
          reasons.push(storyRequirementText(req));
        }
      });
      if (typeof choice.next === 'string' && choice.next && !isStoryNodeUnlocked(storyState.chapterId, choice.next)) {
        reasons.push('该路径尚未解锁');
      }
      return reasons;
    }

    function storyApplyEffect(choice) {
      const chapter = getCurrentStoryChapter();
      (choice.effects || []).forEach(effect => {
        if (effect.type === 'ending') {
          if (canApplyStoryEnding(effect.id)) {
            storyState.currentEndingId = effect.id;
            storyState.appliedEndings.add(effect.id);
          }
          return;
        }
        if (effect.type === 'traitState') {
          const next = Number(effect.delta) || 0;
          const current = Number(storyState.traitState?.[effect.id] ?? 0);
          storyState.traitState = { ...storyState.traitState, [effect.id]: clampNumber(current + next, 0, 100) };
          return;
        }
        if (effect.type === 'skillXp') {
          const skillId = effect.skill;
          const next = Number(effect.delta) || 0;
          const current = Number(storyState.skills?.[skillId] ?? 0);
          const nextValue = clampNumber(current + next, 0, 100);
          storyState.skills = { ...storyState.skills, [skillId]: nextValue };
          if (personSkillConfig[storyPlayerId]?.[skillId] != null) {
            personSkillConfig[storyPlayerId][skillId] = nextValue;
          }
          return;
        }
        if (effect.type === 'globalScore') {
          const id = effect.id;
          const next = Number(effect.delta) || 0;
          const current = Number(storyState.globalScores?.[id] ?? 50);
          storyState.globalScores = { ...storyState.globalScores, [id]: clampNumber(current + next, 0, 100) };
          return;
        }
        if (effect.type === 'axis') {
          const targetId = effect.targetId;
          const axis = effect.axis;
          const next = Number(effect.delta) || 0;
          storyApplyRelationAxis(targetId, axis, next);
          return;
        }
        if (effect.type === 'npcLine') {
          const text = String(effect.text || '').trim();
          if (!text) return;
          const speakerInfo = storyResolveSpeakerIdentity(effect.speaker || '');
          storyState.lastNpcLine = {
            speaker: speakerInfo.name,
            speakerId: speakerInfo.id,
            text,
          };
          return;
        }
        if (effect.type === 'storyFlag') {
          const key = effect.id || `${chapter?.chapterId}-${choice.choiceId}`;
          storyState.storyFlags = { ...storyState.storyFlags, [key]: Boolean(effect.value) };
          return;
        }
        if (effect.type === 'unlockNode') {
          const chapterId = effect.chapterId || storyState.chapterId;
          const unlocked = storyState.unlockedNodesByChapter.get(chapterId) || new Set();
          if (effect.nodeId) unlocked.add(effect.nodeId);
          if (Array.isArray(effect.nodes)) {
            effect.nodes.forEach(nodeId => unlocked.add(nodeId));
          }
          storyState.unlockedNodesByChapter.set(chapterId, unlocked);
          return;
        }
      });
    }

    function applyStoryEnding(endingId, label = '你触发了一个结局') {
      const ending = getCurrentStoryEnding() || (storyCampaign?.endings?.[endingId] ? {
        ...storyCampaign.endings[endingId],
        _id: endingId,
      } : null);
      if (!ending) {
        storyState.currentEndingId = endingId;
        if (label) storyStateLogLine('系统', label);
        storyState.chapterFinished = true;
        return;
      }
      if (!canApplyStoryEnding(endingId || ending._id)) return;

      storyState.currentEndingId = endingId || ending._id;
      storyState.appliedEndings.add(storyState.currentEndingId);
      if (ending.effects) {
        storyApplyEffect({ effects: ending.effects });
      }
      storyState.chapterFinished = true;
      storyStateLogLine('系统', `结局：${ending.title || endingId}`);
      if (ending.summary) {
        storyStateLogLine('系统', ending.summary);
      }
    }

    function storyChooseNode(choiceId) {
      const node = getCurrentStoryNode();
      if (!node || storyState.chapterFinished) return;
      const choice = node.choices?.find(row => row.choiceId === choiceId);
      if (!choice) return;
      const reasons = storyChoiceLockedReasons(choice);
      if (reasons.length) {
        storyStateLogLine('系统', `此选项尚未解锁：${reasons.join('；')}`);
        return;
      }
      storyStateLogLine('你', choice.text || choice.label || '作出选择');
      storyApplyEffect(choice);
      if (choice.ending) {
        const endings = Array.isArray(choice.ending) ? choice.ending : [choice.ending];
        endings.forEach(endingId => applyStoryEnding(endingId));
      }
      storyState.lastChoice = choice;
      const nextNodeId = choice.next;
      storyState.chapterFinished = !!choice.ending || !nextNodeId;
      if (typeof nextNodeId === 'string' && nextNodeId) {
        const next = getStoryNode(storyState.chapterId, nextNodeId);
        if (next) {
          storyState.nodeId = nextNodeId;
          applyStoryNodeEnding(next);
        } else {
          storyState.chapterFinished = true;
          storyStateLogLine('系统', '下个节点缺失，章节结束。');
        }
      } else {
        storyStateLogLine('系统', '本章结束。');
      }
      renderAll();
    }

      ['贾母', ['贾母', '老祖宗', '外祖母']],

    function storySpeakerFromPrefix(prefix = '') {
      const text = String(prefix || '').replace(/\s/g, '');
      for (const [name, aliases] of storyDialogueSpeakerAliases) {
        if (aliases.some(alias => text.includes(alias))) return name;
      }
      return '旁白';
    }

    function storySpeakerIdFromName(name = '') {
      const normalized = storyNormalizeSpeakerName(name);
      if (normalized === '王熙凤' || normalized === '熙凤' || normalized === '凤姐') return 'xifeng';
      if (normalized === '王夫人') return 'wangfuren';
      if (normalized === '贾母' || normalized === '老祖宗' || normalized === '外祖母') return 'jiamu';
      if (normalized === '宝玉') return 'baoyu';
      if (normalized === '黛玉') return storyPlayerId;
      if (normalized === '探春') return 'tanchun';
      if (normalized === '袭人') return 'xiren';
      if (normalized === '鹦哥') return 'zijuan';
      if (normalized === '王嬷嬷') return '';
      return storySourceNameMapReverse.exact[normalized] || '';
    }

    function storyPushNarrationLines(result, text = '') {
      storySplitTextToSentences(text)
        .map(line => String(line || '').trim())
        .filter(Boolean)
        .forEach(line => result.push({ type: 'narrator', speaker: '旁白', text: line }));
    }

    function buildStoryNovelLines(node) {
      const raw = String(node?.narration || '').trim();
      const result = [];
      const quoteRegex = /([^“”\n]{0,28}?)(?:说道|问道|笑道|忙道|回道|报道|骂道|叫着|道|说|问|笑)?：“([^”]+)”/g;
      let lastIndex = 0;
      let match;
      while ((match = quoteRegex.exec(raw)) !== null) {
        const before = raw.slice(lastIndex, match.index);
        storyPushNarrationLines(result, before);
        const speaker = storySpeakerFromPrefix(match[1]);
        const id = storySpeakerIdFromName(speaker);
        storySplitTextToSentences(match[2]).forEach(text => {
          if (!String(text || '').trim()) return;
          result.push({
            type: id === storyPlayerId ? 'player' : 'dialogue',
            speaker,
            speakerId: id,
            text,
          });
        });
        lastIndex = quoteRegex.lastIndex;
      }
      storyPushNarrationLines(result, raw.slice(lastIndex));
      if (storyState.lastNpcLine?.text) {
        result.push({
          type: 'dialogue',
          speaker: storyState.lastNpcLine.speaker || '旁白',
          speakerId: storyState.lastNpcLine.speakerId || '',
          text: storyState.lastNpcLine.text,
        });
      }
      if (storyState.lastChoice?.text) {
        result.push({
          type: 'player',
          speaker: `${storyPlayerName()}（你）`,
          speakerId: storyPlayerId,
          text: storyState.lastChoice.text,
        });
      }
      return result;
    }

            </div>`).join('') || '<div class="story-vn-line narrator"><div class="story-vn-speaker">旁白</div><div class="story-vn-text">此处暂无线索。</div></div>'}

        if (fallbackRows.length) {
          return `<div class="story-card">

        <div class="story-dialogue-lines">
          ${allRows.map(item => `<div class="story-dialogue-row">
            <span class="story-avatar">${storyResolveSpeakerAvatar(item.speakerId, item.speakerName)}</span>
            <span class="story-dialogue-content"><span class="story-dialogue-speaker">${esc(item.speakerName)}：</span><span class="story-dialogue-text">${esc(item.text || '')}</span></span>

        const p = people[selected.id];
        if (!p) return;
        const position = positionForPerson(selected.id);
        const rights = (position?.rights || []).map(rightFor);
        detail.innerHTML = `<div class="detail-cover">
          ${avatarHtml(p)}
          <div>
            <div class="detail-kicker">${esc(position?.label || p.rank)} · ${esc(p.yard)}</div>
            <div class="detail-title">${esc(p.name)}</div>
            <div class="detail-subtitle">${esc(p.role)}</div>
          </div>
        </div>
        <div class="detail-section">
          <h4>位置权利</h4>
          <div class="detail-list">
            <span><b>${esc(position?.label || p.rank)}</b>：${esc(position?.authorityScope || '暂无元数据')}</span>
            <span>${rightTags(position?.rights)}</span>
          </div>
        </div>
        <div class="detail-section">
          <h4>权利对应</h4>
          <div class="detail-list">
            <span><b>管辖院落</b>：${esc((position?.controls?.yards || [p.yard]).join(' / '))}</span>
            <span><b>管辖事务</b>：${esc((position?.controls?.affairs || []).map(id => affairDefs[id]?.label || id).join(' / ') || '随个人起居触发')}</span>
            <span><b>可指挥群体</b>：${esc((position?.commandGroups || []).join(' / ') || '无固定下属')}</span>
          </div>
        </div>
        <div class="detail-section">
          <h4>常管事务</h4>
          <div class="detail-list">${p.duties.map(x => `<span><b>${esc(x)}</b></span>`).join('')}</div>
        </div>
        <div class="detail-section">
          <h4>能力摘要</h4>
          ${renderPersonSkillSummary(p.id)}
        </div>
        <div class="detail-section">
          <h4>适合管理</h4>
          <div class="detail-list">${renderPersonAffairFit(p.id)}</div>
        </div>
        <div class="detail-section">
          <h4>可传令对象</h4>
          <div class="detail-list">${p.commands.length ? p.commands.map(x => `<span>${esc(x)}</span>`).join('') : '<span>无固定下属</span>'}</div>
        </div>
        <div class="detail-section">
          <h4>边界</h4>
          <div class="detail-list">
            ${detailRows(position?.limits || p.limits)}
            ${rights.map(right => `<span class="risk">${esc(right.label)}：${esc(right.risk)}</span>`).join('')}
            <span class="risk">${esc(p.risk)}</span>
          </div>
        </div>
        <div class="action-row">
          <button class="text-btn primary" type="button">传令</button>
          <button class="text-btn" type="button">看起居</button>
        </div>`;
        return;
      }
      if (selected.type === 'yard') {
        const y = yards.find(row => row.name === selected.id);
        const visibleYardPeople = (y?.ids || []).filter(isPersonIdVisible).filter(id => people[id]);
        detail.innerHTML = `<div class="detail-cover">
          <div class="avatar">${esc(y.name.slice(0, 1))}</div>
          <div>
            <div class="detail-kicker">院落归属</div>
            <div class="detail-title">${esc(y.name)}</div>
            <div class="detail-subtitle">主位：${esc(y.owner)}</div>
          </div>
        </div>
        <div class="detail-section">
          <h4>院中人物</h4>
          <div class="detail-list">${visibleYardPeople.map(id => `<span><b>${esc(people[id].name)}</b> · ${esc(people[id].role)}</span>`).join('') || '<span>暂无可见人物</span>'}</div>
        </div>
        <div class="detail-section">
          <h4>常见事务</h4>
          <div class="detail-list">${y.affairs.map(x => `<span>${esc(x)}</span>`).join('')}</div>
        </div>
        <div class="action-row">
          <button class="text-btn primary" type="button">院中传令</button>
          <button class="text-btn" type="button">看任务</button>
        </div>`;
        return;
      }
      const a = affairs.find(row => row.id === selected.id);
      const affairMeta = affairDefs[a.id] || {};
      const controllingPositions = Object.values(positionDefs).filter(position => (position.controls?.affairs || []).includes(a.id));
      const visibleAffairPeople = (a.people || []).filter(isPersonIdVisible).filter(id => people[id]);
      detail.innerHTML = `<div class="detail-cover">
        <div class="avatar">${esc(a.name.slice(0, 1))}</div>
        <div>
          <div class="detail-kicker">事务管辖</div>
          <div class="detail-title">${esc(a.name)}</div>
          <div class="detail-subtitle">${esc(a.lead)}</div>
        </div>
      </div>
      <div class="detail-section">
        <h4>范围</h4>
        <div class="detail-list"><span>${esc(a.scope)}</span><span class="risk">${esc(a.risk)}</span></div>
      </div>
      <div class="detail-section">
        <h4>对应权利</h4>
        <div class="detail-list">
          <span>${rightTags(affairMeta.rights)}</span>
          <span><b>可管位置</b>：${esc(controllingPositions.map(x => x.label).join(' / ') || '暂无')}</span>
        </div>
      </div>
      <div class="detail-section">
        <h4>相关人物</h4>
          <div class="detail-list">${visibleAffairPeople.map(id => `<span><b>${esc(people[id].name)}</b> · ${esc(people[id].role)}</span>`).join('') || '<span>暂无关联</span>'}</div>
        </div>
      <div class="action-row">
        <button class="text-btn primary" type="button">按事务传令</button>
        <button class="text-btn" type="button">看规则</button>
      </div>`;
    }

    function bindNodes() {
      document.querySelectorAll('[data-person]').forEach(btn => {
        btn.onclick = () => {
          selected = { type: 'person', id: btn.dataset.person };
          focusedPersonId = btn.dataset.person;
          renderAll();
        };
      });
    }

    function bindStoryControls() {
      const chapterSelect = document.getElementById('story-chapter-select');
      const storyReset = document.getElementById('story-reset');
      const storyNextChapter = document.getElementById('story-next-chapter');
      if (chapterSelect) {
        chapterSelect.onchange = event => {
          const index = Number(event.target.value);
          if (Number.isFinite(index)) storySelectChapter(index);
        };
      }
      if (storyReset) {
        storyReset.onclick = () => {
          const currentChapter = getCurrentStoryChapter();
          if (!currentChapter) return;
          storyResetChapterRuntimeState(currentChapter, false, false);
          storyState.chapterIndex = storyCampaignChapters.findIndex(chapter => chapter.chapterId === currentChapter.chapterId);
          if (storyState.chapterIndex < 0) storyState.chapterIndex = 0;
          storyStateLogLine('系统', `重开：${currentChapter.title}`);
          renderAll();
        };
      }
      if (storyNextChapter) {
        storyNextChapter.onclick = () => {
          if (!storyState.chapterFinished) return;
          const isLast = storyState.chapterIndex >= storyCampaignChapters.length - 1;
          if (isLast) {
            const currentChapter = getCurrentStoryChapter();
            if (!currentChapter) return;
            storyResetChapterRuntimeState(currentChapter, false, false);
            storyState.chapterIndex = Math.max(0, Math.min(storyCampaignChapters.length - 1, storyState.chapterIndex));
            storyStateLogLine('系统', `重玩：${currentChapter.title}`);
            renderAll();
            return;
          }
          const next = storyCampaignChapters[storyState.chapterIndex + 1];
          if (!next) return;
          storyResetChapterRuntimeState(storyCampaignByChapter.get(next.chapterId) || next, false, false);
          storyState.chapterIndex = storyState.chapterIndex + 1;
          storyStateLogLine('系统', `进入：${next.title}`);
          renderAll();
        };
      }
      document.querySelectorAll('[data-story-choice]').forEach(btn => {
        btn.onclick = () => {
          storyChooseNode(btn.dataset.storyChoice);
        };
      });
    }

    function bindPowerControls() {
      function syncAffairManagers(affair, personId, nextChecked) {
        const ids = allAssignedManagers(affair);
        if (nextChecked) {
          if (ids.includes(personId)) return true;
          if (ids.length >= 5) return false;
          affair.managerIds = Array.from(new Set([...ids, personId]));
          return true;
        }

        if (ids.length <= 1) return false;
        affair.managerIds = ids.filter(id => id !== personId);
        return true;
      }

      document.querySelectorAll('[data-transaction-card]').forEach(card => {
        card.onclick = event => {
          if (event.target.closest('[data-affair-person], .person-chip')) return;
          selectedAffairId = card.dataset.transactionCard;
          renderPower();
          renderDetail();
          bindPowerControls();
        };
      });
      document.querySelectorAll('[data-affair-person]').forEach(input => {
        const chip = input.closest('.person-chip');
        input.onclick = event => {
          event.stopPropagation();
        };
        if (chip) {
          chip.onclick = event => {
            event.stopPropagation();
          };
        }
        input.onchange = event => {
          event.stopPropagation();
          const affair = powerConfig.affairs.find(row => row.id === input.dataset.affairPerson);
          if (!affair) return;
          selectedAffairId = affair.id;
          const personId = input.value;
          const applied = syncAffairManagers(affair, personId, input.checked);
          if (!applied) {
            const ids = assignedManagers(affair);
            input.checked = ids.includes(personId);
            return;
          }
          renderPower();
          renderDetail();
          bindPowerControls();
        };
      });
    }

    function bindSkillControls() {
      document.querySelectorAll('[data-skill-row-person]').forEach(cell => {
        cell.onclick = () => {
          selected = { type: 'person', id: cell.dataset.skillRowPerson };
          renderDetail();
        };
      });
      document.querySelectorAll('[data-skill-person][data-skill-id]').forEach(input => {
        input.oninput = () => {
          const personId = input.dataset.skillPerson;
          const skillId = input.dataset.skillId;
          if (!personSkillConfig[personId]) personSkillConfig[personId] = {};
          const value = clampNumber(Number(input.value), 0, 100);
          personSkillConfig[personId][skillId] = value;
          input.value = value;
          renderPower();
          renderDetail();
          bindPowerControls();
        };
      });
    }

    function setTab(tab) {
      if (tab === 'story') tab = 'rank';
      currentTab = tab;
      const rankLabel = hierarchyLabel();
      document.querySelectorAll('.view').forEach(view => view.classList.toggle('active', view.dataset.view === tab));
      document.querySelectorAll('[data-main-tab]').forEach(btn => {
        const active = btn.dataset.mainTab === tab;
        btn.classList.toggle('active', active);
        btn.setAttribute('aria-selected', active ? 'true' : 'false');
      });
      document.getElementById('rank-tab-label').textContent = rankLabel;
      document.getElementById('view-title').textContent = tab === 'rank'
        ? rankLabel
        : tab === 'skills'
          ? '人物技能'
          : tab === 'power'
            ? '事务'
            : rankLabel;
    }

    function renderAll() {
      syncPersonVisibilityUi();
      normalizeSelection();
      document.getElementById('page-title').textContent = `${currentScene}秩序`;
      if (currentTab === 'rank' || currentTab === 'identity') {
        renderRank();
      } else {
        renderRank();
      }
      if (currentTab === 'story') currentTab = 'rank';
      if (currentTab === 'power') {
        renderPower();
      } else if (currentTab === 'skills') {
        renderSkills();
      } else {
        renderPower();
        renderSkills();
      }
      setTab(currentTab);
      renderDetail();
      bindNodes();
      bindPowerControls();
      bindSkillControls();
    }

    document.querySelectorAll('[data-main-tab]').forEach(btn => {
      btn.onclick = () => {
        currentTab = btn.dataset.mainTab;
        renderAll();
      };
    });

    document.querySelectorAll('[data-rank-mode]').forEach(btn => {
      btn.onclick = () => {
        rankMode = btn.dataset.rankMode;
        currentTab = 'rank';
        renderAll();
      };
    });

    document.querySelectorAll('[data-tree-zoom]').forEach(btn => {
      btn.onclick = () => zoomTree(btn.dataset.treeZoom === 'in' ? .1 : -.1);
    });

    document.querySelector('[data-tree-reset]').onclick = () => {
      resetTreeTransform();
    };

    document.getElementById('yard-filter').onchange = event => {
      activeYardFilter = event.target.value;
      focusedPersonId = '';
      renderAll();
    };

    document.getElementById('affair-filter').onchange = event => {
      activeAffairFilter = event.target.value;
      focusedPersonId = '';
      renderAll();
    };

    document.getElementById('show-all-people').onchange = event => {
      showAllPeople = !!event.target.checked;
      activeYardFilter = 'all';
      activeAffairFilter = 'all';
      focusedPersonId = '';
      renderAll();
    };

    document.getElementById('clear-focus').onclick = () => {
      focusedPersonId = '';
      if (!hasActiveTreeFilter()) {
        treeTransform[rankMode] = defaultTreeTransform(rankMode);
      }
      renderAll();
    };

    document.querySelectorAll('[data-scene]').forEach(btn => {
      btn.onclick = () => {
        currentScene = btn.dataset.scene;
        renderAll();
      };
    });

    renderAll();
  </script>
</body>
</html>
